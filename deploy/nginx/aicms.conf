# AI-CMS V2.0 Nginx 生产环境配置
# 适用于原生部署（非Docker模式）
#
# 安装位置: /etc/nginx/sites-available/aicms.conf
# 启用方式: ln -s /etc/nginx/sites-available/aicms.conf /etc/nginx/sites-enabled/
#
# 前置条件:
#   - PHP-FPM 已安装并运行 (php8.x-fpm)
#   - ThinkPHP 8.1 项目已部署到 /var/www/ai-cms/
#   - 已通过安装向导完成数据库初始化

# PHP-FPM 上游配置
upstream php_backend {
    # 方式A: Unix Socket (默认，性能更好)
    server unix:/run/php/php8.4-fpm.sock;

    # 方式B: TCP端口 (如果socket不可用，注释上面一行，取消下面注释)
    # server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name localhost;  # 修改为你的域名或IP

    # ThinkPHP 8.1 入口目录为项目下的 public/
    root /var/www/ai-cms/public;
    index index.php index.html;

    # ========== 日志配置 ==========
    access_log /var/log/nginx/aicms_access.log;
    error_log /var/log/nginx/aicms_error.log;

    # ========== 文件上传限制 ==========
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_body_timeout 300s;

    # ========== GZIP压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json
               application/javascript application/xml+rss application/rss+xml
               font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_comp_level 6;
    gzip_disable "MSIE [1-6]\.";

    # ========== 安全响应头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== 前台入口 (index.php) ==========
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========== 后台入口 (admin.php) ==========
    location /admin {
        try_files $uri $uri/ /admin.php?$query_string;
    }

    # ========== 安装向导入口 (install.php) ==========
    location /install {
        try_files $uri $uri/ /install.php?$query_string;
    }

    # ========== API路由 ==========
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========== PHP-FPM处理 ==========
    # ThinkPHP 多入口模式：index.php / admin.php / install.php
    location ~ ^(.+\.php)(.*)$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;

        include fastcgi_params;

        # 超时设置 (AI功能可能耗时较长)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ========== 静态资源缓存 ==========
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ========== 主题Skin资源缓存（V2.6 静态资源分离） ==========
    location /skin/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ========== 禁止访问敏感文件 ==========
    location ~ /\.(env|git|svn|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|bak|ini|conf|sh|bat)$ {
        deny all;
        return 404;
    }

    # 禁止访问 ThinkPHP 内部目录
    location ~ ^/(app|config|route|runtime|vendor|database|_v1_archive)/ {
        deny all;
        return 404;
    }

    # 禁止 uploads 目录执行 PHP
    location ~* /uploads/.*\.php$ {
        deny all;
        return 404;
    }

    # ========== 健康检查端点 ==========
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

