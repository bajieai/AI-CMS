version: '3.8'

services:
  nginx:
    image: nginx:1.24-alpine
    container_name: aicms_nginx
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - php
      - mysql
      - redis
    networks:
      - aicms_network

  php:
    build: ./docker/php
    container_name: aicms_php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PHP_MEMORY_LIMIT=256M
      - PHP_MAX_EXECUTION_TIME=300
      - PHP_UPLOAD_MAX_FILESIZE=20M
      - PHP_POST_MAX_SIZE=25M
    networks:
      - aicms_network

  mysql:
    image: mysql:8.0
    container_name: aicms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_cms
      MYSQL_USER: aicms
      MYSQL_PASSWORD: aicms123456
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicms_network

  redis:
    image: redis:7-alpine
    container_name: aicms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - aicms_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  aicms_network:
    driver: bridge
