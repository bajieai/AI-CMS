<!-- V2.9.14: AI配图弹窗（shared子模板，双皮肤共用） -->
<div class="modal fade" id="ai-image-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-image me-2"></i>AI配图</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="ai-image-status" class="text-muted small mb-3"></div>
                <div id="ai-image-candidates" class="row g-3"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-outline-primary" onclick="AiImage.regenerate()">
                    <i class="bi bi-arrow-clockwise me-1"></i>重新生成
                </button>
            </div>
        </div>
    </div>
</div>
