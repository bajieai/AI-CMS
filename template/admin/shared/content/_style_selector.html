<!-- V2.9.14: 写作风格选择弹窗（shared子模板，双皮肤共用） -->
<div class="modal fade" id="ai-style-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pen me-2"></i>选择写作风格</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="ai-style-selector" class="ai-style-grid"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="AiStyle.generate()">
                    <i class="bi bi-lightning me-1"></i>按风格生成
                </button>
            </div>
        </div>
    </div>
</div>
