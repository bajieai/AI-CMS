{extend name="/layout" /}
{block name="title"}订阅管理 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">📬 订阅管理</h4>
        <div>
            <a href="/admin/subscriber/export" class="btn btn-sm btn-outline-success"><i class="bi bi-download"></i> 导出CSV</a>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addModal"><i class="bi bi-plus-lg"></i> 添加</button>
        </div>
    </div>
    <div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead class="table-light"><tr><th>ID</th><th>邮箱</th><th>状态</th><th>来源</th><th>订阅时间</th><th>操作</th></tr></thead><tbody id="listBody"><tr><td colspan="6" class="text-center py-4">加载中...</td></tr></tbody></table></div></div>
    <div class="modal fade" id="addModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>添加订阅者</h5></div><div class="modal-body"><input type="email" id="addEmail" class="form-control" placeholder="输入邮箱"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="addSub()">确认</button></div></div></div></div>
</div>
{/block}
{block name="js"}
<script>
function loadList(){$.get('/admin/subscriber/list',function(r){var h='',d=r.data||[];if(!d.length)h='<tr><td colspan="6" class="text-center py-4">暂无</td></tr>';else d.forEach(function(i){h+='<tr><td>'+i.id+'</td><td>'+i.email+'</td><td><span class="badge '+(i.status==1?'bg-success':i.status==0?'bg-warning':'bg-secondary')+'">'+(i.status==1?'已确认':i.status==0?'待确认':'已退订')+'</span></td><td>'+i.source+'</td><td>'+i.subscribed_at+'</td><td><button class="btn btn-sm btn-outline-danger" onclick="del('+i.id+')">删除</button></td></tr>'});$('#listBody').html(h)})}
function addSub(){var e=$('#addEmail').val();if(!e)return;$.post('/admin/subscriber/add',{email:e},function(r){alert(r.msg);$('#addModal').modal('hide');loadList()})}
function del(id){if(!confirm('确定删除？'))return;$.post('/admin/subscriber/delete',{id:id},function(r){alert(r.msg);loadList()})}
$(loadList);
</script>
{/block}
