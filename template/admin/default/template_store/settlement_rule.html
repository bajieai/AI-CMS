{extend name="layout" /}
{block name="content"}
<div class="container-fluid px-4">
    <h4 class="mt-4 mb-3">结算规则配置</h4>
    <div class="mb-3"><a href="/admin/template_settlement_admin/index" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回列表</a></div>
    <div class="card mb-4">
        <div class="card-body">
            <form method="post" action="/admin/template_settlement_admin/rule">
                <input type="hidden" name="developer_id" value="{$developerId}">
                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label">开发者ID</label><input type="text" class="form-control" value="{$developerId}" disabled></div>
                    <div class="col-md-4"><label class="form-label">平台抽成比例(%)</label><input type="number" step="0.01" name="commission_rate" class="form-control" value="{$rule.commission_rate??30}" required></div>
                    <div class="col-md-4"><label class="form-label">最低提现金额</label><input type="number" step="0.01" name="min_withdraw" class="form-control" value="{$rule.min_withdraw??100}" required></div>
                </div>
                <div class="mb-3"><label class="form-label">结算周期</label><select name="settle_cycle" class="form-select" style="width:200px">
                    <option value="1" {if ($rule.settle_cycle??1)==1}selected{/if}>月结</option>
                    <option value="2" {if ($rule.settle_cycle??1)==2}selected{/if}>季结</option>
                    <option value="3" {if ($rule.settle_cycle??1)==3}selected{/if}>年结</option>
                </select></div>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>保存规则</button>
            </form>
        </div>
    </div>
</div>
{/block}
