{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-pencil me-1"></i>编辑模板SEO</h5></div>
    <div class="card-body">
        <form method="post" action="/admin/template_store_seo/editTemplateSeo/{$template.id}">
            <div class="mb-3"><label class="form-label">模板名称</label><input type="text" class="form-control" value="{$template.name}" disabled></div>
            <div class="mb-3"><label class="form-label">SEO标题</label><input type="text" name="seo_title" class="form-control" value="{$template.seo_title}"></div>
            <div class="mb-3"><label class="form-label">SEO描述</label><textarea name="seo_description" class="form-control" rows="3">{$template.seo_description}</textarea></div>
            <div class="mb-3"><label class="form-label">SEO关键词</label><input type="text" name="seo_keywords" class="form-control" value="{$template.seo_keywords}"></div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/admin/template_store_seo/index" class="btn btn-secondary">返回</a>
        </form>
    </div>
</div>
{/block}
