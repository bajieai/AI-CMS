{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-flag me-1"></i>评价举报管理</h5></div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>举报原因</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
            {volist name="list" id="vo"}
            <tr>
                <td>{$vo.id}</td><td>{$vo.reason}</td>
                <td>{if $vo.status==0}<span class="badge bg-warning">待处理</span>{elseif $vo.status==1}<span class="badge bg-success">已处理</span>{else}<span class="badge bg-secondary">已忽略</span>{/if}</td>
                <td>{$vo.create_time|date='Y-m-d H:i'}</td>
                <td><a href="/admin/template_review_admin/handleReport/{$vo.id}" class="btn btn-sm btn-outline-primary">处理</a></td>
            </tr>
            {/volist}
            </tbody>
        </table>
        {$list|raw}
    </div>
</div>
{/block}
