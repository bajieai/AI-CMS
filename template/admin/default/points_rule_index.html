{extend name="layout" /}

{block name="title"}积分规则配置{/block}

{block name="breadcrumb"}
<li class="breadcrumb-item"><a href="/admin/points_rule/index">用户管理</a></li>
<li class="breadcrumb-item active">积分规则</li>
{/block}

{block name="content"}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-star me-2" style="color:var(--primary)"></i>积分规则配置</h5>
    <button class="btn btn-primary" id="btnSave"><i class="bi bi-check-lg me-1"></i>保存配置</button>
</div>

<div class="card" style="border:none;box-shadow:var(--card-shadow)">
    <div class="card-body">
        <div class="row g-4">
            <div class="col-lg-6">
                <h6 class="mb-3"><i class="bi bi-calendar-check me-1 text-success"></i>签到积分</h6>
                <div class="mb-3">
                    <label class="form-label">每日签到积分</label>
                    <input type="number" class="form-control" name="points_signin" value="{$rules.points_signin|default=5}" min="0">
                    <div class="form-text">每日签到获得的基础积分</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">连续3天额外积分</label>
                    <input type="number" class="form-control" name="points_signin_3days" value="{$rules.points_signin_3days|default=10}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">连续7天额外积分</label>
                    <input type="number" class="form-control" name="points_signin_7days" value="{$rules.points_signin_7days|default=30}" min="0">
                </div>
            </div>

            <div class="col-lg-6">
                <h6 class="mb-3"><i class="bi bi-chat-dots me-1 text-info"></i>互动积分</h6>
                <div class="mb-3">
                    <label class="form-label">发表评论积分</label>
                    <input type="number" class="form-control" name="points_comment" value="{$rules.points_comment|default=2}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">评论被点赞积分</label>
                    <input type="number" class="form-control" name="points_comment_liked" value="{$rules.points_comment_liked|default=1}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">内容被点赞积分</label>
                    <input type="number" class="form-control" name="points_content_liked" value="{$rules.points_content_liked|default=3}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">内容被收藏积分</label>
                    <input type="number" class="form-control" name="points_content_favorited" value="{$rules.points_content_favorited|default=5}" min="0">
                </div>
            </div>

            <div class="col-lg-6">
                <h6 class="mb-3"><i class="bi bi-person-plus me-1 text-primary"></i>注册/登录积分</h6>
                <div class="mb-3">
                    <label class="form-label">注册奖励积分</label>
                    <input type="number" class="form-control" name="points_register" value="{$rules.points_register|default=50}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">每日首次登录积分</label>
                    <input type="number" class="form-control" name="points_daily_login" value="{$rules.points_daily_login|default=1}" min="0">
                </div>
            </div>

            <div class="col-lg-6">
                <h6 class="mb-3"><i class="bi bi-shield-check me-1 text-warning"></i>每日上限</h6>
                <div class="mb-3">
                    <label class="form-label">评论被点赞每日上限</label>
                    <input type="number" class="form-control" name="points_comment_liked_daily_limit" value="{$rules.points_comment_liked_daily_limit|default=10}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">内容被点赞每日上限</label>
                    <input type="number" class="form-control" name="points_content_liked_daily_limit" value="{$rules.points_content_liked_daily_limit|default=20}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">内容被收藏每日上限</label>
                    <input type="number" class="form-control" name="points_content_favorited_daily_limit" value="{$rules.points_content_favorited_daily_limit|default=10}" min="0">
                </div>
            </div>
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
$(function(){
    $('#btnSave').click(function(){
        var data = {};
        $('input[name^="points_"]').each(function(){
            data[$(this).attr('name')] = $(this).val();
        });
        $.post('/admin/points_rule/save', data, function(d){
            $.toast(d.msg, d.code===0?'success':'danger');
        });
    });
});
</script>
{/block}
