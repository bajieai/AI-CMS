{extend name="layout" /}
{block name="title"}支付配置{/block}

{block name="content"}
<div class="container-fluid">
    <h4 class="mb-3"><i class="bi bi-credit-card me-2"></i>支付配置</h4>

    <form id="pay-config-form">
        <!-- 全局开关 -->
        <div class="card mb-3">
            <div class="card-header"><i class="bi bi-toggle-on me-1"></i>全局设置</div>
            <div class="card-body">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" name="pay_enabled" value="1" {if $pay_enabled}checked{/if} id="pay_enabled">
                    <label class="form-check-label" for="pay_enabled">启用支付功能</label>
                </div>
                <small class="text-muted">启用前请先配置支付参数</small>
            </div>
        </div>

        <!-- 微信支付 -->
        <div class="card mb-3">
            <div class="card-header"><i class="bi bi-wechat me-1"></i>微信支付</div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="pay_wechat_enabled" value="1" {if $pay_wechat_enabled}checked{/if} id="pay_wechat_enabled">
                    <label class="form-check-label" for="pay_wechat_enabled">启用微信支付</label>
                </div>
                <div class="row g-2">
                    <div class="col-md-6">
                        <label class="form-label">AppID</label>
                        <input type="text" name="pay_wechat_app_id" class="form-control" value="{$pay_wechat_app_id}" placeholder="微信AppID">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">商户号</label>
                        <input type="text" name="pay_wechat_mch_id" class="form-control" value="{$pay_wechat_mch_id}" placeholder="微信商户号">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">API密钥</label>
                        <input type="password" name="pay_wechat_api_key" class="form-control" placeholder="微信API密钥">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">回调URL</label>
                        <input type="text" name="pay_wechat_notify_url" class="form-control" placeholder="https://your-domain.com/api/pay_notify/wechat">
                    </div>
                </div>
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" name="pay_wechat_sandbox" value="1" {if $pay_wechat_sandbox}checked{/if} id="pay_wechat_sandbox">
                    <label class="form-check-label" for="pay_wechat_sandbox">沙箱模式（测试用）</label>
                </div>
            </div>
        </div>

        <!-- 支付宝 -->
        <div class="card mb-3">
            <div class="card-header"><i class="bi bi-alipay me-1"></i>支付宝</div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="pay_alipay_enabled" value="1" {if $pay_alipay_enabled}checked{/if} id="pay_alipay_enabled">
                    <label class="form-check-label" for="pay_alipay_enabled">启用支付宝支付</label>
                </div>
                <div class="row g-2">
                    <div class="col-md-6">
                        <label class="form-label">AppID</label>
                        <input type="text" name="pay_alipay_app_id" class="form-control" value="{$pay_alipay_app_id}" placeholder="支付宝AppID">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">回调URL</label>
                        <input type="text" name="pay_alipay_notify_url" class="form-control" placeholder="https://your-domain.com/api/pay_notify/alipay">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">同步跳转URL</label>
                        <input type="text" name="pay_alipay_return_url" class="form-control" placeholder="https://your-domain.com/pay/return">
                    </div>
                </div>
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" name="pay_alipay_sandbox" value="1" {if $pay_alipay_sandbox}checked{/if} id="pay_alipay_sandbox">
                    <label class="form-check-label" for="pay_alipay_sandbox">沙箱模式（测试用）</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>保存配置</button>
    </form>
</div>

<script>
$('#pay-config-form').on('submit', function(e) {
    e.preventDefault();
    var data = {};
    $(this).find('input').each(function() {
        var name = $(this).attr('name');
        if (!name) return;
        if ($(this).attr('type') === 'checkbox') {
            data[name] = $(this).is(':checked') ? '1' : '0';
        } else {
            data[name] = $(this).val();
        }
    });
    $.post('/admin/pay_config/save', data, function(res) {
        alert(res.code === 0 ? '保存成功' : (res.msg || '保存失败'));
    });
});
</script>
{/block}
