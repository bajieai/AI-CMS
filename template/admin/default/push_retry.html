{extend name="/layout" /}
{block name="title"}жҺЁйҖҒйҮҚиҜ•йҳҹеҲ— - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">рҹ”„ жҺЁйҖҒйҮҚиҜ•йҳҹеҲ—</h4>
    <div class="row mb-4">
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="statPending">-</h5><p class="card-text text-muted">еҫ…йҮҚиҜ•</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-success" id="statSuccess">-</h5><p class="card-text text-muted">е·ІжҲҗеҠҹ</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-danger" id="statFailed">-</h5><p class="card-text text-muted">е·ІеӨұиҙҘ</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body">
            <button class="btn btn-primary btn-sm" onclick="processRetry()">жүӢеҠЁжү§иЎҢйҮҚиҜ•</button>
            <button class="btn btn-outline-secondary btn-sm ms-2" onclick="cleanup()">жё…зҗҶеҺҶеҸІ</button>
        </div></div></div>
    </div>
    <div class="row mb-3">
        <div class="col-md-3">
            <select id="filterStatus" class="form-select form-select-sm" onchange="loadList()">
                <option value="">е…ЁйғЁзҠ¶жҖҒ</option><option value="0">еҫ…йҮҚиҜ•</option><option value="1">жҲҗеҠҹ</option><option value="-1">еӨұиҙҘ</option>
            </select>
        </div>
    </div>
    <div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead class="table-light"><tr><th>ID</th><th>жҺЁйҖҒID</th><th>йҖҡйҒ“</th><th>еҺҹеӣ </th><th>йҮҚиҜ•ж¬Ўж•°</th><th>зҠ¶жҖҒ</th><th>дёӢж¬ЎйҮҚиҜ•</th><th>еҲӣе»әж—¶й—ҙ</th></tr></thead><tbody id="retryBody"><tr><td colspan="8" class="text-center py-4">еҠ иҪҪдёӯ...</td></tr></tbody></table></div></div>
</div>
{/block}
{block name="js"}
<script>
function loadStats(){$.get('/admin/push/retryStats',function(r){var d=r.data||{};$('#statPending').text(d.pending||0);$('#statSuccess').text(d.success||0);$('#statFailed').text(d.failed||0)})}
function loadList(){var s=$('#filterStatus').val();$.get('/admin/push/retry/list',{status:s},function(r){var h='',d=r.data||[];if(!d.length)h='<tr><td colspan="8" class="text-center py-4">жҡӮж— </td></tr>';else d.forEach(function(i){var st=i.status==1?'bg-success':i.status==-1?'bg-danger':'bg-warning';var stxt=i.status==1?'жҲҗеҠҹ':i.status==-1?'еӨұиҙҘ':'еҫ…йҮҚиҜ•';h+='<tr><td>'+i.id+'</td><td>'+i.push_id+'</td><td>'+i.channel+'</td><td><small>'+i.reason+'</small></td><td>'+i.retry_count+'</td><td><span class="badge '+st+'">'+stxt+'</span></td><td>'+(i.next_retry_at?new Date(i.next_retry_at*1000).toLocaleString():'-')+'</td><td>'+(i.created_at?new Date(i.created_at*1000).toLocaleString():'-')+'</td></tr>'});$('#retryBody').html(h)})}
function processRetry(){$.post('/admin/push/retry/process',{limit:50},function(r){if(r.code===0){alert(r.msg);loadStats();loadList()}else{alert(r.msg||'жү§иЎҢеӨұиҙҘ')}})}
function cleanup(){if(!confirm('зЎ®и®Өжё…зҗҶ7еӨ©еүҚзҡ„е·Іе®ҢжҲҗ/еӨұиҙҘи®°еҪ•пјҹ'))return;$.post('/admin/push/retry/cleanup',{days:7},function(r){if(r.code===0){alert(r.msg);loadStats();loadList()}else{alert(r.msg||'жё…зҗҶеӨұиҙҘ')}})}
loadStats();loadList();
</script>
{/block}
