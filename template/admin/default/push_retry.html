{extend name="/layout" /}
{block name="title"}推送重试队列 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">🔄 推送重试队列</h4>
    <div class="row mb-4">
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="statPending">-</h5><p class="card-text text-muted">待重试</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-success" id="statSuccess">-</h5><p class="card-text text-muted">已成功</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-danger" id="statFailed">-</h5><p class="card-text text-muted">已失败</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body">
            <button class="btn btn-primary btn-sm" onclick="processRetry()">手动执行重试</button>
            <button class="btn btn-outline-secondary btn-sm ms-2" onclick="cleanup()">清理历史</button>
        </div></div></div>
    </div>
    <div class="row mb-3">
        <div class="col-md-3">
            <select id="filterStatus" class="form-select form-select-sm" onchange="loadList()">
                <option value="">全部状态</option><option value="0">待重试</option><option value="1">成功</option><option value="-1">失败</option>
            </select>
        </div>
    </div>
    <div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead class="table-light"><tr><th>ID</th><th>推送ID</th><th>通道</th><th>原因</th><th>重试次数</th><th>状态</th><th>下次重试</th><th>创建时间</th></tr></thead><tbody id="retryBody"><tr><td colspan="8" class="text-center py-4">加载中...</td></tr></tbody></table></div></div>
</div>
{/block}
{block name="js"}
<script>
function loadStats(){$.get('/admin/push/retryStats',function(r){var d=r.data||{};$('#statPending').text(d.pending||0);$('#statSuccess').text(d.success||0);$('#statFailed').text(d.failed||0)})}
function loadList(){var s=$('#filterStatus').val();$.get('/admin/push/retry/list',{status:s},function(r){var h='',d=r.data||[];if(!d.length)h='<tr><td colspan="8" class="text-center py-4">暂无</td></tr>';else d.forEach(function(i){var st=i.status==1?'bg-success':i.status==-1?'bg-danger':'bg-warning';var stxt=i.status==1?'成功':i.status==-1?'失败':'待重试';h+='<tr><td>'+i.id+'</td><td>'+i.push_id+'</td><td>'+i.channel+'</td><td><small>'+i.reason+'</small></td><td>'+i.retry_count+'</td><td><span class="badge '+st+'">'+stxt+'</span></td><td>'+(i.next_retry_at?new Date(i.next_retry_at*1000).toLocaleString():'-')+'</td><td>'+(i.created_at?new Date(i.created_at*1000).toLocaleString():'-')+'</td></tr>'});$('#retryBody').html(h)})}
function processRetry(){$.post('/admin/push/retry/process',{limit:50},function(r){if(r.code===0){alert(r.msg);loadStats();loadList()}else{alert(r.msg||'执行失败')}})}
function cleanup(){if(!confirm('确认清理7天前的已完成/失败记录？'))return;$.post('/admin/push/retry/cleanup',{days:7},function(r){if(r.code===0){alert(r.msg);loadStats();loadList()}else{alert(r.msg||'清理失败')}})}
$(function(){loadStats();loadList()});
</script>
{/block}
