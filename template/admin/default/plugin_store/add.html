{extend name="layout" /}
{block name="content"}
<div class="container-fluid px-4">
    <h4 class="mt-4 mb-3"><i class="bi bi-plus-lg me-2"></i>新增插件包</h4>
    <div class="card">
        <div class="card-body">
            <form id="addForm" method="post" action="/admin/plugin_store/add">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">插件标识 <span class="text-danger">*</span></label>
                        <input type="text" name="code" class="form-control" required placeholder="字母数字下划线，如 seo_helper">
                        <div class="form-text">唯一标识，安装后作为目录名</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">插件名称 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required placeholder="如 SEO优化助手">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">版本号 <span class="text-danger">*</span></label>
                        <input type="text" name="version" class="form-control" value="1.0.0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">分类</label>
                        <select name="category_id" class="form-select">
                            <option value="0">未分类</option>
                            {volist name="categories" id="c"}
                            <option value="{$c.id}">{$c.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">价格</label>
                        <input type="number" name="price" class="form-control" value="0" step="0.01" min="0">
                        <div class="form-text">0 = 免费</div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="插件功能描述..."></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">作者</label>
                        <input type="text" name="author" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">作者链接</label>
                        <input type="url" name="author_url" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">图标URL</label>
                        <input type="url" name="icon" class="form-control" placeholder="https://...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">标签</label>
                        <input type="text" name="tags" class="form-control" placeholder="SEO,优化,搜索">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">排序</label>
                        <input type="number" name="sort" class="form-control" value="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-select">
                            <option value="1">上架</option>
                            <option value="0">下架</option>
                            <option value="2">审核中</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>保存</button>
                        <a href="/admin/plugin_store/index" class="btn btn-outline-secondary">返回</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{/block}
{block name="script"}
<script>
document.getElementById('addForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    fetch(form.action, {
        method: 'POST',
        body: new FormData(form)
    }).then(r => r.json()).then(res => {
        layer.msg(res.msg);
        if (res.code === 0) setTimeout(() => location.href = '/admin/plugin_store/index', 800);
    });
});
</script>
{/block}
