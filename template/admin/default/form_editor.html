{extend name="layout" /}

{block name="title"}表单可视化编辑器{/block}

{block name="breadcrumb"}
<li class="breadcrumb-item">运营管理</li>
<li class="breadcrumb-item"><a href="/admin/form/index">表单管理</a></li>
<li class="breadcrumb-item active">可视化编辑器</li>
{/block}

{block name="css"}
<style>
.fe-layout { display: flex; height: calc(100vh - 140px); gap: 16px; }
.fe-panel { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
.fe-panel-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
.fe-panel-body { flex: 1; overflow-y: auto; padding: 12px; }
.fe-toolbox { width: 200px; }
.fe-tool-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: grab; margin-bottom: 6px; border: 1px solid transparent; transition: .15s; font-size: 13px; color: #334155; }
.fe-tool-item:hover { background: #f8fafc; border-color: #e2e8f0; }
.fe-tool-item i { font-size: 16px; color: #64748b; }
.fe-canvas { flex: 1; min-width: 0; }
.fe-empty { text-align: center; color: #94a3b8; padding: 60px 20px; border: 2px dashed #e2e8f0; border-radius: 12px; }
.fe-field-item { border: 2px solid transparent; border-radius: 10px; padding: 14px; margin-bottom: 10px; background: #f8fafc; cursor: pointer; position: relative; }
.fe-field-item:hover { border-color: #cbd5e1; }
.fe-field-item.active { border-color: #3b82f6; background: #eff6ff; }
.fe-field-label { font-weight: 500; font-size: 13px; margin-bottom: 6px; color: #1e293b; }
.fe-field-preview { opacity: .7; pointer-events: none; }
.fe-field-actions { position: absolute; top: 8px; right: 10px; display: none; gap: 4px; }
.fe-field-item:hover .fe-field-actions { display: flex; }
.fe-field-item.active .fe-field-actions { display: flex; }
.fe-props { width: 280px; }
.fe-props .form-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
</style>
{/block}

{block name="content"}
<div class="mb-3 d-flex align-items-center gap-2">
    <input type="text" id="formTitle" class="form-control form-control-sm" placeholder="表单名称" value="{$form.title|default='未命名表单'}" style="max-width:300px;">
    <select id="fePresetSelect" class="form-select form-select-sm" style="max-width:160px;">
        <option value="">加载预设模板</option>
        <option value="contact">联系我们</option>
        <option value="register">在线报名</option>
        <option value="survey">问卷调查</option>
        <option value="feedback">意见反馈</option>
    </select>
    <button type="button" class="btn btn-primary btn-sm" onclick="saveForm()"><i class="bi bi-save me-1"></i>保存表单</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="previewForm()"><i class="bi bi-eye me-1"></i>预览</button>
</div>

<div class="fe-layout">
    <!-- 左侧工具箱 -->
    <div class="fe-panel fe-toolbox">
        <div class="fe-panel-header"><i class="bi bi-tools me-1"></i>字段工具箱</div>
        <div class="fe-panel-body" id="feToolbox"></div>
    </div>
    <!-- 中间画布 -->
    <div class="fe-panel fe-canvas" id="feCanvasWrap">
        <div class="fe-panel-header"><i class="bi bi-grid-1x2 me-1"></i>画布</div>
        <div class="fe-panel-body" id="feCanvas">
            <div class="fe-empty">从左侧拖拽字段到此处</div>
        </div>
    </div>
    <!-- 右侧属性 -->
    <div class="fe-panel fe-props">
        <div class="fe-panel-header"><i class="bi bi-sliders me-1"></i>属性</div>
        <div class="fe-panel-body" id="feProps">
            <div class="text-muted small text-center py-4">点击画布中的字段编辑属性</div>
        </div>
    </div>
</div>

<input type="hidden" id="formId" value="{$form.id|default=0}">
{/block}

{block name="js"}
<script src="/assets/js/form-editor.js?v=2.7"></script>
<script>
$(function() {
    FormEditor.init();
    // 如果后端传了现有字段配置，加载之
    var existing = '{$form.fields_config|default=""|raw}';
    if (existing) {
        try { FormEditor.loadJson(existing); } catch(e) {}
    }
});

function saveForm() {
    var data = {
        id: $('#formId').val(),
        title: $('#formTitle').val(),
        fields_config: FormEditor.getJson()
    };
    ajaxPost('/admin/form/saveEditor', data, function(res) {
        if (res.code === 0) {
            showToast('保存成功', 'success');
            if (res.data && res.data.id) $('#formId').val(res.data.id);
        } else {
            showToast(res.msg || '保存失败', 'danger');
        }
    });
}

function previewForm() {
    var json = FormEditor.getJson();
    var w = window.open('', 'formPreview', 'width=800,height=600');
    w.document.write('<!DOCTYPE html><html><head><link href="/assets/css/bootstrap.min.css" rel="stylesheet"><title>预览</title></head><body class="p-4">');
    w.document.write('<h5>表单预览</h5><hr>');
    // 简单渲染预览（实际项目中可复用前台渲染逻辑）
    w.document.write('<p class="text-muted">预览窗口</p>');
    w.document.write('</body></html>');
    w.document.close();
}
</script>
{/block}
