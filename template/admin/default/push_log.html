{extend name="/layout" /}
{block name="title"}推送日志 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">📋 推送日志</h4>
        <div>
            <select id="filterStatus" class="form-select form-select-sm d-inline-block" style="width:140px" onchange="loadList()">
                <option value="">全部状态</option>
                <option value="0">待发送</option>
                <option value="1">成功</option>
                <option value="2">失败</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width:60px">ID</th>
                        <th>推送通道</th>
                        <th style="width:80px">内容ID</th>
                        <th>请求URL</th>
                        <th style="width:70px">状态码</th>
                        <th style="width:80px">耗时</th>
                        <th style="width:80px">状态</th>
                        <th style="width:140px">推送时间</th>
                        <th style="width:100px">操作</th>
                    </tr>
                </thead>
                <tbody id="logTbody">
                    <tr><td colspan="9" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer">
            <div id="pagination" class="d-flex justify-content-between align-items-center"></div>
        </div>
    </div>
</div>
{/block}

{block name="js"}
<script>
var currentPage = 1;
var totalPages = 1;

function loadList(page) {
    page = page || 1;
    currentPage = page;
    var status = $('#filterStatus').val();
    $.get('/admin/push/log/list', { page: page, limit: 15, status: status }, function(res) {
        var list = res.data || [];
        var total = res.total || 0;
        totalPages = Math.ceil(total / 15);

        var html = '';
        if (list.length === 0) {
            html = '<tr><td colspan="9" class="text-center text-muted py-4">暂无推送日志</td></tr>';
        } else {
            list.forEach(function(log) {
                var statusBadge = log.status == 1 ? 'bg-success' : log.status == 2 ? 'bg-danger' : 'bg-warning';
                var statusText = log.status == 1 ? '成功' : log.status == 2 ? '失败' : '待发送';
                var urlShort = log.request_url ? (log.request_url.length > 50 ? log.request_url.substring(0, 50) + '...' : log.request_url) : '-';
                html += '<tr>';
                html += '<td>' + log.id + '</td>';
                html += '<td><span class="badge bg-info">' + (log.channel_name || '未知') + '</span></td>';
                html += '<td>' + log.content_id + '</td>';
                html += '<td><small>' + urlShort + '</small></td>';
                html += '<td>' + log.response_code + '</td>';
                html += '<td>' + log.duration_ms + 'ms</td>';
                html += '<td><span class="badge ' + statusBadge + '">' + statusText + '</span></td>';
                html += '<td><small>' + log.created_at + '</small></td>';
                html += '<td>';
                if (log.status == 2) {
                    html += '<button class="btn btn-sm btn-outline-warning" onclick="retryPush(' + log.id + ')">重试</button>';
                } else {
                    html += '<span class="text-muted">-</span>';
                }
                html += '</td>';
                html += '</tr>';
            });
        }
        $('#logTbody').html(html);
        renderPagination();
    });
}

function renderPagination() {
    var html = '<small class="text-muted">共 ' + totalPages + ' 页</small>';
    html += '<nav><ul class="pagination pagination-sm mb-0">';
    html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="javascript:void(0)" onclick="loadList(' + (currentPage - 1) + ')">上一页</a></li>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="javascript:void(0)" onclick="loadList(' + i + ')">' + i + '</a></li>';
    }
    html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '"><a class="page-link" href="javascript:void(0)" onclick="loadList(' + (currentPage + 1) + ')">下一页</a></li>';
    html += '</ul></nav>';
    $('#pagination').html(html);
}

function retryPush(id) {
    if (!confirm('重新推送此内容？')) return;
    $.post('/admin/push/log/retry/' + id, function(res) {
        if (res.code === 0) {
            alert('✅ 重试成功');
        } else {
            alert('❌ 重试失败: ' + (res.msg || ''));
        }
        loadList(currentPage);
    });
}

$(function() {
    loadList();
});
</script>
{/block}
