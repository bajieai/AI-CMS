{extend name="layout" /}
{block name="title"}模板数据分析 - AI-CMS{/block}
{block name="css"}
<style>
.stat-card { border-radius: 12px; border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: transform .15s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.stat-card .stat-value { font-size: 2rem; font-weight: 700; line-height: 1.2; }
.stat-card .stat-label { font-size: .85rem; color: #64748b; }
.chart-card { border-radius: 12px; border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.chart-card .card-header { background: #fff; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: .95rem; }
</style>
{/block}

{block name="content"}
<div class="container-fluid py-4">
    <!-- 页头 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1"><i class="bi bi-graph-up me-2"></i>模板数据分析</h4>
            <p class="text-muted small mb-0">主题安装、定制偏好与评分统计</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/admin/theme_analysis/exportCsv?type=ranking" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>导出排行
            </a>
            <a href="/admin/theme_analysis/exportCsv?type=custom" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>导出定制
            </a>
            <button class="btn btn-outline-primary btn-sm" onclick="refreshAll()">
                <i class="bi bi-arrow-clockwise me-1"></i>刷新
            </button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card text-white" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);">
                <div class="card-body">
                    <div class="stat-label">定制主题数</div>
                    <div class="stat-value" id="statCustomThemes">-</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-white" style="background:linear-gradient(135deg,#22c55e,#15803d);">
                <div class="card-body">
                    <div class="stat-label">总安装量</div>
                    <div class="stat-value" id="statTotalInstalls">-</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-white" style="background:linear-gradient(135deg,#f59e0b,#b45309);">
                <div class="card-body">
                    <div class="stat-label">平均评分</div>
                    <div class="stat-value" id="statAvgRating">-</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-white" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9);">
                <div class="card-body">
                    <div class="stat-label">定制率</div>
                    <div class="stat-value" id="statCustomRate">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区 -->
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card chart-card">
                <div class="card-header"><i class="bi bi-bar-chart me-2"></i>安装量排行 Top 10</div>
                <div class="card-body p-3">
                    <div id="chartRanking" style="height:350px;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card chart-card">
                <div class="card-header"><i class="bi bi-line-chart me-2"></i>近30天安装趋势</div>
                <div class="card-body p-3">
                    <div id="chartTrend" style="height:350px;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card chart-card">
                <div class="card-header"><i class="bi bi-pie-chart me-2"></i>定制偏好分析</div>
                <div class="card-body p-3">
                    <div id="chartCustom" style="height:350px;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card chart-card">
                <div class="card-header"><i class="bi bi-star me-2"></i>评分分布</div>
                <div class="card-body p-3">
                    <div id="chartScore" style="height:350px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
$(function() {
    loadAllCharts();
});

function refreshAll() {
    loadAllCharts();
}

function loadAllCharts() {
    loadRanking();
    loadTrend();
    loadCustomPreference();
    loadScoreDistribution();
}

function loadRanking() {
    $.getJSON('/admin/theme_analysis/installRanking', function(res) {
        if (res.code !== 0) return;
        const data = res.data || [];
        const names = data.map(function(d) { return d.theme_name; });
        const values = data.map(function(d) { return d.install_count; });

        const chart = echarts.init(document.getElementById('chartRanking'));
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: names, axisLabel: { rotate: 30, fontSize: 11 } },
            yAxis: { type: 'value', name: '安装次数' },
            series: [{
                type: 'bar',
                data: values,
                itemStyle: {
                    borderRadius: [4, 4, 0, 0],
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#3b82f6' },
                        { offset: 1, color: '#93c5fd' }
                    ])
                },
                barWidth: '50%'
            }]
        });
        $(window).on('resize', function() { chart.resize(); });
    });
}

function loadTrend() {
    $.getJSON('/admin/theme_analysis/installTrend', function(res) {
        if (res.code !== 0) return;
        const data = res.data || [];
        const dates = data.map(function(d) { return d.date.substring(5); });
        const values = data.map(function(d) { return d.count; });

        const total = values.reduce(function(a, b) { return a + b; }, 0);
        $('#statTotalInstalls').text(total);

        const chart = echarts.init(document.getElementById('chartTrend'));
        chart.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: dates, boundaryGap: false },
            yAxis: { type: 'value', name: '安装次数', minInterval: 1 },
            series: [{
                type: 'line',
                data: values,
                smooth: true,
                areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(34,197,94,0.3)' },
                    { offset: 1, color: 'rgba(34,197,94,0.02)' }
                ])},
                lineStyle: { color: '#22c55e', width: 2 },
                itemStyle: { color: '#22c55e' }
            }]
        });
        $(window).on('resize', function() { chart.resize(); });
    });
}

function loadCustomPreference() {
    $.getJSON('/admin/theme_analysis/customPreference', function(res) {
        if (res.code !== 0) return;
        const d = res.data || {};
        $('#statCustomThemes').text(d.customized_themes || 0);

        const chart = echarts.init(document.getElementById('chartCustom'));
        chart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: '5%', left: 'center' },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true, formatter: '{b}\n{d}%' },
                data: [
                    { value: d.color_changes || 0, name: '颜色', itemStyle: { color: '#3b82f6' } },
                    { value: d.font_changes || 0, name: '字体', itemStyle: { color: '#8b5cf6' } },
                    { value: d.layout_changes || 0, name: '布局', itemStyle: { color: '#f59e0b' } },
                    { value: d.logo_changes || 0, name: 'Logo', itemStyle: { color: '#22c55e' } },
                ]
            }]
        });
        $(window).on('resize', function() { chart.resize(); });
    });
}

function loadScoreDistribution() {
    $.getJSON('/admin/theme_analysis/scoreDistribution', function(res) {
        if (res.code !== 0) return;
        const d = res.data || {};
        $('#statAvgRating').text(d.avg_rating || '-');

        const dist = d.distribution || [];
        const names = dist.map(function(item) { return item.rating + '星'; });
        const values = dist.map(function(item) { return item.count; });
        // V2.9.8: 定制率由后端计算（安装总数为分母），前端直接使用
        $('#statCustomRate').text(d.customization_rate || '-');

        const chart = echarts.init(document.getElementById('chartScore'));
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: names },
            yAxis: { type: 'value', name: '评分数量', minInterval: 1 },
            series: [{
                type: 'bar',
                data: values.map(function(v, i) {
                    const colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e', '#3b82f6'];
                    return { value: v, itemStyle: { color: colors[i], borderRadius: [4, 4, 0, 0] } };
                }),
                barWidth: '40%'
            }]
        });
        $(window).on('resize', function() { chart.resize(); });
    });
}
</script>
{/block}
