{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-phone me-1"></i>PWA配置</h5></div>
    <div class="card-body">
        <form method="post" action="/admin/pwa_config/save">
            <div class="mb-3"><label class="form-label">启用PWA</label><select name="pwa_enabled" class="form-select" style="width:200px;"><option value="1" {if $config.pwa_enabled=='1'}selected{/if}>启用</option><option value="0" {if $config.pwa_enabled=='0'}selected{/if}>禁用</option></select></div>
            <div class="mb-3"><label class="form-label">应用名称</label><input type="text" name="pwa_app_name" class="form-control" style="max-width:400px;" value="{$config.pwa_app_name}"></div>
            <div class="mb-3"><label class="form-label">应用短名称</label><input type="text" name="pwa_app_short_name" class="form-control" style="max-width:400px;" value="{$config.pwa_app_short_name}"></div>
            <div class="mb-3"><label class="form-label">主题色</label><input type="color" name="pwa_theme_color" value="{$config.pwa_theme_color}" style="width:60px;"></div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
{/block}
