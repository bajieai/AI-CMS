<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI-CMS</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/bootstrap-icons.min.css" rel="stylesheet">
    <!-- V2.6 登录页样式（从内联提取到外部CSS文件） -->
    <link href="{$skin_admin}css/login.css?v=2.6" rel="stylesheet">
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-robot"></i>
            <h4>AI-CMS</h4>
            <p>AI驱动的企业信息管理系统</p>
        </div>
        <div class="login-body">
            <form id="loginForm" method="post" action="/admin/login">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required autofocus>
                    <label for="username"><i class="bi bi-person me-1"></i>用户名</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
                    <label for="password"><i class="bi bi-lock me-1"></i>密码</label>
                </div>
                <button type="submit" class="btn btn-primary btn-login" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right me-1"></i>登 录
                </button>
            </form>
        </div>
        <div class="login-footer">
            AI-CMS V2.0 &copy; 2025
        </div>
    </div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/jquery.min.js"></script>
    <script>
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var $btn = $('#btnLogin');
            $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>登录中...');

            $.ajax({
                url: $(this).attr('action'),
                type: 'POST',
                data: $(this).serialize(),
                dataType: 'json',
                success: function(res) {
                    if (res.code === 0) {
                        $btn.html('<i class="bi bi-check-lg me-1"></i>登录成功');
                        setTimeout(function() {
                            location.href = res.data.redirect || '/admin';
                        }, 500);
                    } else {
                        alert(res.msg || '登录失败');
                        $btn.prop('disabled', false).html('<i class="bi bi-box-arrow-in-right me-1"></i>登 录');
                    }
                },
                error: function() {
                    alert('网络错误，请重试');
                    $btn.prop('disabled', false).html('<i class="bi bi-box-arrow-in-right me-1"></i>登 录');
                }
            });
        });
    </script>
</body>
</html>
