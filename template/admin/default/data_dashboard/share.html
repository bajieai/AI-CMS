{extend name="layout" /}

{block name="title"}大屏分享 - AI-CMS{/block}

{block name="breadcrumb"}
<li class="breadcrumb-item">数据中心</li>
<li class="breadcrumb-item"><a href="/admin/data_dashboard/index">数据大屏</a></li>
<li class="breadcrumb-item active">分享</li>
{/block}

{block name="content"}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-share me-1"></i>数据大屏分享</h5>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="bi bi-info-circle me-1"></i>
            分享后可通过链接在外部访问此大屏数据（仅展示公开数据）。
        </div>

        <div class="mb-3">
            <label class="form-label">分享链接</label>
            <div class="input-group">
                <input type="text" id="shareUrl" class="form-control" readonly value="{$share_url|default=''}">
                <button class="btn btn-outline-primary" type="button" onclick="copyShareUrl()"><i class="bi bi-clipboard"></i> 复制</button>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">分享Token</label>
            <input type="text" class="form-control" readonly value="{$dashboard.share_token|default=''}">
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="enableShare" {if $dashboard.is_public eq 1}checked{/if} onchange="toggleShare()">
                <label class="form-check-label" for="enableShare">启用公开分享</label>
            </div>
        </div>

        <div class="mb-3">
            <button type="button" class="btn btn-warning btn-sm" onclick="regenerateToken()">
                <i class="bi bi-arrow-repeat me-1"></i>重新生成Token
            </button>
        </div>
    </div>
</div>

<script>
function copyShareUrl() {
    var input = document.getElementById('shareUrl');
    input.select();
    document.execCommand('copy');
    alert('链接已复制');
}
function toggleShare() {
    $.post('/admin/data_dashboard/toggle_share', {id: '{$dashboard.id}'}, function(res) {
        if (res.code === 0) { alert('已更新'); }
    });
}
function regenerateToken() {
    if (!confirm('确认重新生成Token？旧链接将失效。')) return;
    $.post('/admin/data_dashboard/regenerate_token', {id: '{$dashboard.id}'}, function(res) {
        if (res.code === 0) { alert('Token已更新'); location.reload(); }
    });
}
</script>
{/block}
