{extend name="layout" /}
{block name="title"}{if condition="$workflow"}编辑{else/}创建{/if}审批工作流 - AI-CMS{/block}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-{if condition="$workflow"}pencil-square{else/}plus-circle{/if}"></i> {if condition="$workflow"}编辑{else/}创建{/if}审批工作流</h5></div>
    <div class="card-body">
        <form method="post" action="{:url('/admin/workflow/edit')}" id="wfForm">
            <input type="hidden" name="id" value="{$workflow.id??''}">
            <div class="mb-3"><label class="form-label">工作流名称</label><input type="text" name="name" class="form-control" value="{$workflow.name??''}" required></div>
            <hr>
            <h6>审核步骤 <button type="button" class="btn btn-outline-primary btn-sm ms-2" id="btnAddStep"><i class="bi bi-plus-lg"></i> 添加步骤</button></h6>
            <div id="stepsContainer" class="mb-2"></div>
            <input type="hidden" name="steps" value="{$workflow.steps??'[]'}">

            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{:url('/admin/workflow/index')}" class="btn btn-secondary">返回</a>
            </div>
        </form>
    </div>
</div>
{/block}
{block name="js"}
<script>
$(function(){
    var $form = $('#wfForm');
    var $stepsContainer = $('#stepsContainer');

    function addStep(name, approver, type) {
        var idx = $stepsContainer.find('.step-card').length + 1;
        var card = '<div class="card mb-2 step-card border-info">';
        card += '<div class="card-body p-2">';
        card += '<div class="row g-2 align-items-center">';
        card += '<div class="col-auto"><span class="badge bg-info">步骤'+idx+'</span></div>';
        card += '<div class="col-md-3"><input type="text" class="form-control form-control-sm step-name" placeholder="步骤名称 (如 编辑审核)" value="'+(name||'')+'"></div>';
        card += '<div class="col-md-3"><input type="text" class="form-control form-control-sm step-approver" placeholder="审核人角色/ID (如 editor)" value="'+(approver||'')+'"></div>';
        card += '<div class="col-md-2"><select class="form-select form-select-sm step-type"><option value="approve">审批</option><option value="reject">驳回</option><option value="return">退回修改</option></select></div>';
        card += '<div class="col-md-2"><select class="form-select form-select-sm step-required"><option value="1">必须通过</option><option value="0">可选</option></select></div>';
        card += '<div class="col-md-1"><button type="button" class="btn btn-outline-danger btn-sm step-remove"><i class="bi bi-trash"></i></button></div>';
        card += '</div></div></div>';
        var $card = $(card);
        if (type) $card.find('.step-type').val(type);
        $stepsContainer.append($card);
        syncSteps();
    }

    function syncSteps() {
        var steps = [];
        $stepsContainer.find('.step-card').each(function(i){
            var $c = $(this);
            var name = $.trim($c.find('.step-name').val());
            var approver = $.trim($c.find('.step-approver').val());
            var type = $c.find('.step-type').val();
            var required = $c.find('.step-required').val();
            if (name || approver) {
                steps.push({ step: i+1, name: name, approver: approver, type: type, required: required == '1' });
            }
            $c.find('.badge').text('步骤'+(i+1));
        });
        $form.find('[name="steps"]').val(JSON.stringify(steps));
    }

    $stepsContainer.on('input', '.step-name,.step-approver', syncSteps);
    $stepsContainer.on('change', '.step-type,.step-required', syncSteps);
    $stepsContainer.on('click', '.step-remove', function(){
        $(this).closest('.step-card').remove();
        syncSteps();
    });

    $('#btnAddStep').click(function(){ addStep('', '', 'approve'); });

    // 加载已有步骤
    try {
        var existing = JSON.parse($form.find('[name="steps"]').val() || '[]');
        $.each(existing, function(i, s){ addStep(s.name, s.approver, s.type); });
    } catch(e) {}

    $form.on('submit', function(e) {
        e.preventDefault();
        syncSteps();
        $.post($form.attr('action'), $form.serialize(), function(res) {
            alert(res.msg);
            if (res.code === 0) location.href = '{:url("/admin/workflow/index")}';
        });
    });
});
</script>
{/block}
