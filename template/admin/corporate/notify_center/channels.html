{extend name="layout" /}
{block name="title"}通知渠道 - AI-CMS{/block}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-diagram-3"></i> 通知渠道管理</h5></div>
    <div class="card-body">
        <div class="row">
            {volist name="channels" id="vo"}
            <div class="col-md-3 mb-3">
                <div class="card {if condition="$vo.enabled eq 1"}border-success{else/}border-danger{/if}">
                    <div class="card-body text-center">
                        <h5><i class="bi bi-{if condition="$vo.code eq 'sms'"}chat-dots{elseif condition="$vo.code eq 'email'"/}envelope{elseif condition="$vo.code eq 'in_app'"/}bell{elseif condition="$vo.code eq 'wechat'"/}wechat{/if}"></i> {$vo.name}</h5>
                        <p class="text-muted small">{$vo.description|default=''}</p>
                        <p>今日发送: <strong>{$stats[$vo.code].today|default=0}</strong></p>
                        <p>成功率: <strong>{$stats[$vo.code].success_rate|default='100'}%</strong></p>
                        <button onclick="toggleChannel('{$vo.code}')" class="btn btn-sm {if condition="$vo.enabled eq 1"}btn-outline-danger{else/}btn-outline-success{/if}">
                            {if condition="$vo.enabled eq 1"}禁用{else/}启用{/if}
                        </button>
                        <button onclick="testChannel('{$vo.code}')" class="btn btn-outline-primary btn-sm"><i class="bi bi-send"></i> 测试</button>
                    </div>
                </div>
            </div>
            {/volist}
        </div>
    </div>
</div>
<script>
function toggleChannel(code) {
    $.post('{:url("/admin/notify_center/toggleChannel")}', {code: code}, function(res){
        if(res.code === 0) location.reload(); else alert(res.msg);
    });
}
function testChannel(code) {
    $.post('{:url("/admin/notify_center/testChannel")}', {code: code}, function(res){
        if(res.code === 0) alert('测试发送成功'); else alert(res.msg);
    });
}
</script>
{/block}
