{extend name="/layout" /}
{block name="title"}邮件模板 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">邮件模板</h4>
        <a href="/admin/email_template/add" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> 添加模板</a>
    </div>
    <div class="card"><div class="card-body">
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>名称</th><th>编码</th><th>主题</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
            {volist name="list" id="vo"}
            <tr>
                <td>{$vo.id}</td>
                <td>{$vo.name}</td>
                <td><code>{$vo.code}</code></td>
                <td>{$vo.subject}</td>
                <td>{if $vo.is_enabled==1}<span class="badge bg-success">启用</span>{else/}<span class="badge bg-secondary">禁用</span>{/if}</td>
                <td>
                    <a href="/admin/email_template/edit/{$vo.id}" class="btn btn-sm btn-outline-info">编辑</a>
                    <button class="btn btn-sm btn-outline-secondary" onclick="resetDefault('{$vo.code}')">恢复默认</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="testSend()">测试发送</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem({$vo.id})">删除</button>
                </td>
            </tr>
            {/volist}
            </tbody>
        </table>
        {$list|raw}
    </div></div>
</div>
{/block}

{block name="js"}
<script>
function resetDefault(code) { if(!confirm('确定恢复默认模板？当前内容将被覆盖。')) return; $.post('/admin/email_template/resetDefault', {code:code}, function(res) { alert(res.msg); if(res.code==0) location.reload(); }); }
function testSend() {
    var email = prompt('请输入测试邮箱地址：');
    if (!email) return;
    $.post('/admin/email_template/test', {email:email}, function(res) { alert(res.msg); });
}
function deleteItem(id) { if(!confirm('确定删除？')) return; $.post('/admin/email_template/delete', {id:id}, function(res) { alert(res.msg); location.reload(); }); }
</script>
{/block}
