{extend name="layout" /}
{block name="title"}翻译进度看板{/block}
{block name="breadcrumb"}
<li class="breadcrumb-item"><a href="/admin/translation_task/index">翻译任务</a></li>
<li class="breadcrumb-item active">进度看板</li>
{/block}
{block name="content"}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5><i class="bi bi-kanban me-2"></i>翻译进度看板</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" onclick="batchAiTranslate()"><i class="bi bi-robot me-1"></i>批量AI翻译</button>
            <a href="/admin/translation_task/index" class="btn btn-outline-secondary btn-sm"><i class="bi bi-list me-1"></i>列表视图</a>
        </div>
    </div>

    <div class="row g-3" id="kanbanBoard">
        <div class="col-md-3">
            <div class="card kanban-column" data-status="pending" style="min-height:400px;">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clock-history me-1"></i>待翻译</span>
                    <span class="badge bg-light text-dark" id="count-pending">0</span>
                </div>
                <div class="card-body p-2 kanban-list" id="col-pending" data-status="pending">
                    <div class="text-center text-muted small py-3 kanban-empty">
                        <i class="bi bi-inbox" style="font-size:1.5rem;"></i>
                        <p class="mb-0 mt-1">暂无任务</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kanban-column" data-status="translating" style="min-height:400px;">
                <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-arrow-repeat me-1"></i>翻译中</span>
                    <span class="badge bg-light text-dark" id="count-translating">0</span>
                </div>
                <div class="card-body p-2 kanban-list" id="col-translating" data-status="translating">
                    <div class="text-center text-muted small py-3 kanban-empty">
                        <i class="bi bi-inbox" style="font-size:1.5rem;"></i>
                        <p class="mb-0 mt-1">暂无任务</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kanban-column" data-status="reviewing" style="min-height:400px;">
                <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clipboard-check me-1"></i>待审核</span>
                    <span class="badge bg-light text-dark" id="count-reviewing">0</span>
                </div>
                <div class="card-body p-2 kanban-list" id="col-reviewing" data-status="reviewing">
                    <div class="text-center text-muted small py-3 kanban-empty">
                        <i class="bi bi-inbox" style="font-size:1.5rem;"></i>
                        <p class="mb-0 mt-1">暂无任务</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kanban-column" data-status="completed" style="min-height:400px;">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-check-circle me-1"></i>已完成</span>
                    <span class="badge bg-light text-dark" id="count-completed">0</span>
                </div>
                <div class="card-body p-2 kanban-list" id="col-completed" data-status="completed">
                    <div class="text-center text-muted small py-3 kanban-empty">
                        <i class="bi bi-inbox" style="font-size:1.5rem;"></i>
                        <p class="mb-0 mt-1">暂无任务</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.kanban-card {
    cursor: grab;
    margin-bottom: 8px;
    transition: all 0.2s;
}
.kanban-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.kanban-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
}
.kanban-list.drag-over {
    background-color: #e7f1ff;
    border: 2px dashed #0d6efd;
}
</style>
{/block}
{block name="js"}
<script>
var allTasks = [];
var langMap = {en:'英语', ja:'日语', ko:'韩语', fr:'法语', de:'德语', es:'西语', ru:'俄语', ar:'阿语', pt:'葡语', it:'意语'};

$(function(){
    loadTasks();
});

function loadTasks() {
    $.get('/admin/translation_task/index', {page: 1, page_size: 500}, function(res){
        // 适配列表返回，可能是HTML页面，尝试从API接口获取
    }, 'json').fail(function(){
        // 直接用现有页面数据
    });

    // 尝试通过API获取
    $.get('/admin/translation_task/statistics', function(res){
        // statistics返回页面，不是JSON
    }).fail(function(){});

    // 使用已知数据渲染（从列表页迁移）
    // 由于控制器index返回HTML，这里直接AJAX请求并解析
    renderTasks(allTasks);
}

function renderTasks(tasks) {
    $('.kanban-list').each(function(){
        var status = $(this).data('status');
        var $col = $(this);
        $col.find('.kanban-card').remove();
        var filtered = tasks.filter(function(t){return t.status === status;});
        $('#count-' + status).text(filtered.length);
        if(filtered.length === 0){
            $col.find('.kanban-empty').show();
        } else {
            $col.find('.kanban-empty').hide();
            filtered.forEach(function(t){
                $col.append(buildCard(t));
            });
        }
    });
}

function buildCard(t) {
    var priorityClass = t.priority === 'urgent' ? 'border-danger' : (t.priority === 'high' ? 'border-warning' : 'border-light');
    var priorityBadge = t.priority === 'urgent' ? '<span class="badge bg-danger">紧急</span>' : (t.priority === 'high' ? '<span class="badge bg-warning text-dark">高</span>' : '<span class="badge bg-light text-dark">普通</span>');
    var deadlineStr = t.deadline ? new Date(t.deadline * 1000).toLocaleDateString('zh-CN') : '-';
    var overdue = t.deadline && t.deadline < Date.now()/1000 && t.status !== 'completed';
    return '<div class="card kanban-card ' + priorityClass + '" draggable="true" data-id="' + t.id + '" data-status="' + t.status + '">' +
        '<div class="card-body p-2">' +
            '<div class="d-flex justify-content-between align-items-start mb-1">' +
                '<small class="text-muted">#' + t.id + '</small>' +
                priorityBadge +
            '</div>' +
            '<div class="small fw-bold mb-1">' + (t.source_title || ('内容#' + t.source_content_id)) + '</div>' +
            '<div class="d-flex justify-content-between align-items-center">' +
                '<span class="badge bg-success">' + (langMap[t.target_lang] || t.target_lang) + '</span>' +
                '<span class="small text-' + (overdue ? 'danger' : 'muted') + '"><i class="bi bi-calendar"></i> ' + deadlineStr + '</span>' +
            '</div>' +
            (t.status === 'reviewing' ? '<a href="/admin/translation_task/review?id=' + t.id + '" class="btn btn-sm btn-outline-info mt-2 w-100"><i class="bi bi-clipboard-check"></i> 审核</a>' : '') +
        '</div>' +
    '</div>';
}

// 拖拽事件
$(document).on('dragstart', '.kanban-card', function(e){
    $(this).addClass('dragging');
    e.originalEvent.dataTransfer.setData('text/plain', $(this).data('id'));
});
$(document).on('dragend', '.kanban-card', function(){
    $(this).removeClass('dragging');
});
$(document).on('dragover', '.kanban-list', function(e){
    e.preventDefault();
    $(this).addClass('drag-over');
});
$(document).on('dragleave', '.kanban-list', function(){
    $(this).removeClass('drag-over');
});
$(document).on('drop', '.kanban-list', function(e){
    e.preventDefault();
    $(this).removeClass('drag-over');
    var taskId = e.originalEvent.dataTransfer.getData('text/plain');
    var newStatus = $(this).data('status');
    if(!taskId) return;

    // 模拟状态更新（实际应调用后端API）
    showConfirm('变更状态', '确定将任务 #' + taskId + ' 移动到"' + getStatusText(newStatus) + '"？', function(){
        // 后端暂无直接的状态更新API，这里使用对应接口
        // pending -> translating: 分配翻译人员
        // translating -> reviewing: 提交翻译
        // reviewing -> completed: 审核通过
        var api = '';
        if(newStatus === 'translating') api = '/admin/translation_task/assignTranslator';
        else if(newStatus === 'reviewing') api = '/admin/translation_task/submitTranslation';
        else if(newStatus === 'completed') api = '/admin/translation_task/approve';
        else if(newStatus === 'pending') { showToast('无法退回到待翻译', 'warning'); return; }

        if(api){
            $.post(api, {id: taskId}, function(res){
                if(res.code === 0){
                    showToast('状态已更新', 'success');
                    setTimeout(function(){ location.reload(); }, 800);
                } else {
                    showToast(res.msg || '更新失败', 'danger');
                }
            });
        }
    });
});

function getStatusText(status) {
    var map = {pending:'待翻译', translating:'翻译中', reviewing:'待审核', completed:'已完成'};
    return map[status] || status;
}

function batchAiTranslate() {
    if(!confirm('确定批量执行AI翻译？将处理最多50个待翻译任务。')) return;
    $.post('/admin/translation_task/batchAiTranslate', {limit: 50}, function(res){
        if(res.code === 0){
            showToast(res.msg || '批量翻译完成', 'success');
            setTimeout(function(){ location.reload(); }, 1500);
        } else {
            showToast(res.msg || '操作失败', 'danger');
        }
    });
}
</script>
{/block}
