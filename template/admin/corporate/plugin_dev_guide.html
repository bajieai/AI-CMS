{extend name="/layout" /}
{block name="title"}插件开发者文档 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-book"></i> 插件开发者文档</h4>
        <a href="/admin/plugin/index" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 返回插件管理
        </a>
    </div>

    {if $guideExists}
    <div class="card">
        <div class="card-body">
            <div id="markdownContent" style="display:none;">{$guideContent|htmlspecialchars}</div>
            <div id="renderedContent" class="markdown-body"></div>
        </div>
    </div>
    {else/}
    <div class="card">
        <div class="card-body text-center py-5">
            <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:#ffc107;"></i>
            <h5 class="mt-3">文档未找到</h5>
            <p class="text-muted">开发者文档文件不存在，请确认 <code>docs/plugin-development-guide.md</code> 文件已正确放置。</p>
        </div>
    </div>
    {/if}
</div>
{/block}

{block name="js"}
<!-- Markdown 解析器 -->
<script src="/assets/js/marked.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var raw = document.getElementById('markdownContent');
    if (raw) {
        var md = raw.textContent || raw.innerText;
        document.getElementById('renderedContent').innerHTML = marked.parse(md);
    }
});
</script>
<style>
.markdown-body { padding: 1rem 2rem; line-height: 1.8; }
.markdown-body h1 { font-size: 1.8rem; border-bottom: 2px solid #eee; padding-bottom: .3rem; margin-top: 1.5rem; }
.markdown-body h2 { font-size: 1.5rem; margin-top: 1.2rem; }
.markdown-body h3 { font-size: 1.2rem; margin-top: 1rem; }
.markdown-body pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
.markdown-body code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
.markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: 8px 12px; }
.markdown-body th { background: #f6f8fa; }
.markdown-body blockquote { border-left: 4px solid #0969da; padding-left: 1rem; color: #57606a; }
</style>
{/block}
