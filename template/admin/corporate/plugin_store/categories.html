{extend name="layout" /}
{block name="content"}
<div class="container-fluid px-4">
    <h4 class="mt-4 mb-3"><i class="bi bi-tags me-2"></i>分类管理</h4>
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">分类列表</span>
            <a href="/admin/plugin_store/categoryEdit" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg me-1"></i>新增分类</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr><th>ID</th><th>名称</th><th>排序</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        {volist name="list" id="item"}
                        <tr>
                            <td>{$item.id}</td>
                            <td>{$item.name}</td>
                            <td>{$item.sort}</td>
                            <td>{if $item.status == 1}<span class="badge bg-success">启用</span>{else}<span class="badge bg-secondary">禁用</span>{/if}</td>
                            <td>
                                <a href="/admin/plugin_store/categoryEdit/{$item.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory({$item.id})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        {/volist}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{/block}
{block name="script"}
<script>
function deleteCategory(id) {
    layer.confirm('确定删除该分类？', function() {
        fetch('/admin/plugin_store/categoryDelete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'id=' + id
        }).then(r => r.json()).then(res => {
            layer.msg(res.msg);
            if (res.code === 0) setTimeout(() => location.reload(), 800);
        });
    });
}
</script>
{/block}
