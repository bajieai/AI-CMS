{extend name="/layout" /}
{block name="title"}{if $info}编辑{else/}添加{/if}积分商品 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">{if $info}编辑{else/}添加{/if}积分商品</h4>
    <div class="card">
        <div class="card-body">
            <form id="productForm">
                <input type="hidden" name="id" value="{$info.id|default='0'}">
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">商品名称</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="title" value="{$info.title|default=''}" placeholder="请输入商品名称" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">商品描述</label>
                    <div class="col-sm-10">
                        <textarea class="form-control" name="description" rows="3">{$info.description|default=''}</textarea>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">商品图片</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="image" value="{$info.image|default=''}" placeholder="图片URL">
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">所需积分</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control" name="points" value="{$info.points|default='0'}" min="0" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">库存</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control" name="stock" value="{$info.stock|default='0'}" placeholder="-1表示无限">
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">商品类型</label>
                    <div class="col-sm-10">
                        <select class="form-select" name="type">
                            <option value="virtual" {if condition="isset($info) && $info.type=='virtual'"}selected{/if}>虚拟物品</option>
                            <option value="physical" {if condition="isset($info) && $info.type=='physical'"}selected{/if}>实物</option>
                            <option value="coupon" {if condition="isset($info) && $info.type=='coupon'"}selected{/if}>优惠券</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">类型配置JSON</label>
                    <div class="col-sm-10">
                        <textarea class="form-control" name="config" rows="3" placeholder='{"code":"XXX"}'>{$info.config|default=''}</textarea>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">排序</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control" name="sort" value="{$info.sort|default='0'}" min="0">
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">上架状态</label>
                    <div class="col-sm-10">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_enabled" value="1" {if condition="!isset($info) || $info.is_enabled==1"}checked{/if}>
                        </div>
                    </div>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                    <a href="/admin/points_product/index" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </div>
</div>
{/block}

{block name="js"}
<script>
$('#productForm').on('submit', function(e) {
    e.preventDefault();
    var data = $(this).serialize();
    $.post('/admin/points_product/save', data, function(res) {
        alert(res.msg);
        if (res.code === 0) location.href = '/admin/points_product/index';
    });
});
</script>
{/block}
