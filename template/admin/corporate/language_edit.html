{extend name="/layout" /}
{block name="title"}{if $info}编辑{else/}添加{/if}语言 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">{if $info}编辑{else/}添加{/if}语言</h4>
    <div class="card"><div class="card-body">
        <form id="langForm">
            <input type="hidden" name="id" value="{$info.id|default=0}">
            <div class="mb-3">
                <label class="form-label">语言名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" value="{$info.name|default=''}" required placeholder="如：简体中文">
            </div>
            <div class="mb-3">
                <label class="form-label">语言编码 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="code" value="{$info.code|default=''}" required placeholder="如：zh-cn, en-us">
            </div>
            <div class="mb-3">
                <label class="form-label">排序</label>
                <input type="number" class="form-control" name="sort" value="{$info.sort|default=0}">
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_default" value="1" id="swDefault" {if isset($info) && $info.is_default==1}checked{/if}>
                <label class="form-check-label" for="swDefault">设为默认语言</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_enabled" value="1" id="swStatus" {if !isset($info) || $info.is_enabled==1}checked{/if}>
                <label class="form-check-label" for="swStatus">启用</label>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/admin/language/index" class="btn btn-secondary">返回</a>
        </form>
    </div></div>
</div>
{/block}

{block name="js"}
<script>
$('#langForm').on('submit', function(e) {
    e.preventDefault();
    $.post('/admin/language/save', $(this).serialize(), function(res) {
        if (res.code === 0) location.href = '/admin/language/index';
        else alert(res.msg);
    });
});
</script>
{/block}
