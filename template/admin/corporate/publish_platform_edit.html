{extend name="/layout" /}
{block name="title"}{if $info}编辑{else/}添加{/if}发布平台 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">{if $info}编辑{else/}添加{/if}发布平台</h4>
    <div class="card"><div class="card-body">
        <form id="platformForm">
            <input type="hidden" name="id" value="{$info.id??0}">
            <div class="mb-3">
                <label class="form-label">平台标识 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" value="{$info.name??''}" required placeholder="如：wechat, weibo">
            </div>
            <div class="mb-3">
                <label class="form-label">显示名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="display_name" value="{$info.display_name??''}" required placeholder="如：微信公众号">
            </div>
            <div class="mb-3">
                <label class="form-label">配置参数 <button type="button" class="btn btn-outline-primary btn-sm ms-2" id="btnAddParam"><i class="bi bi-plus-lg"></i> 添加</button></label>
                <div class="row g-2 mb-2" id="paramsContainer">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm param-key" placeholder="参数名 (如 app_id)"></div>
                    <div class="col-md-7"><input type="text" class="form-control form-control-sm param-val" placeholder="参数值"></div>
                    <div class="col-md-1"><button type="button" class="btn btn-outline-danger btn-sm param-remove" disabled><i class="bi bi-trash"></i></button></div>
                </div>
                <input type="hidden" name="config_json" value="<?php echo isset($info['config_json']) ? htmlentities((string) $info['config_json']) : '&#123;&#125;'; ?>">
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_enabled" value="1" id="swEnabled" {if !isset($info) || $info.is_enabled==1}checked{/if}>
                <label class="form-check-label" for="swEnabled">启用</label>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/admin/publish_platform/index" class="btn btn-secondary">返回</a>
        </form>
    </div></div>
</div>
{/block}

{block name="js"}
<script>
$(function(){
    var $form = $('#platformForm');
    var $paramsContainer = $('#paramsContainer');

    function syncConfig() {
        var obj = {};
        $paramsContainer.find('.row').each(function(){
            var $r = $(this);
            var key = $.trim($r.find('.param-key').val());
            var val = $.trim($r.find('.param-val').val());
            if (key) obj[key] = val;
        });
        $form.find('[name="config_json"]').val(JSON.stringify(obj));
    }

    function addParamRow(key, val) {
        var row = '<div class="row g-2 mb-2">';
        row += '<div class="col-md-4"><input type="text" class="form-control form-control-sm param-key" placeholder="参数名" value="'+(key||'')+'"></div>';
        row += '<div class="col-md-7"><input type="text" class="form-control form-control-sm param-val" placeholder="参数值" value="'+(val||'')+'"></div>';
        row += '<div class="col-md-1"><button type="button" class="btn btn-outline-danger btn-sm param-remove"><i class="bi bi-trash"></i></button></div>';
        row += '</div>';
        $paramsContainer.append($(row));
        syncConfig();
    }

    $paramsContainer.on('input', '.param-key,.param-val', syncConfig);
    $paramsContainer.on('click', '.param-remove', function(){
        if ($paramsContainer.find('.row').length > 1) {
            $(this).closest('.row').remove();
            syncConfig();
        }
    });

    $('#btnAddParam').click(function(){ addParamRow('', ''); });

    try {
        var cfg = JSON.parse($form.find('[name="config_json"]').val() || '{}');
        $.each(cfg, function(k, v){ addParamRow(k, v); });
    } catch(e) {}

    $form.on('submit', function(e) {
        e.preventDefault();
        syncConfig();
        $.post('/admin/publish_platform/save', $form.serialize(), function(res) {
            if (res.code === 0) location.href = '/admin/publish_platform/index';
            else alert(res.msg);
        });
    });
});
</script>
{/block}
