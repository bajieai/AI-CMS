{extend name="/layout" /}
{block name="title"}发送系统通知 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">发送系统通知</h4>
    <div class="card">
        <div class="card-body">
            <form id="sendForm">
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">通知标题</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="title" placeholder="请输入通知标题" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">通知类型</label>
                    <div class="col-sm-10">
                        <select class="form-select" name="type">
                            <option value="system">系统通知</option>
                            <option value="vip">VIP通知</option>
                            <option value="ai">AI服务</option>
                            <option value="order">订单通知</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">通知内容</label>
                    <div class="col-sm-10">
                        <textarea class="form-control" name="content" rows="6" placeholder="请输入通知内容" required></textarea>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">跳转链接</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="target_url" placeholder="可选，如 /home/content/detail/id/1.html">
                    </div>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> 发送通知</button>
                </div>
            </form>
        </div>
    </div>
</div>
{/block}

{block name="js"}
<script>
$('#sendForm').on('submit', function(e) {
    e.preventDefault();
    var data = $(this).serialize();
    $.post('/admin/message/sendSystem', data, function(res) {
        alert(res.msg);
        if (res.code === 0) location.href = '/admin/message/system';
    });
});
</script>
{/block}
