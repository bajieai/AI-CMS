{extend name="layout" /}
{block name="title"}待审核应用 - AI-CMS{/block}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-hourglass-split"></i> 待审核应用</h5></div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-sm">
                <thead><tr><th>ID</th><th>应用名称</th><th>开发者</th><th>分类</th><th>版本</th><th>提交时间</th><th>操作</th></tr></thead>
                <tbody>
                    {volist name="list" id="vo"}
                    <tr>
                        <td>{$vo.id}</td>
                        <td>{$vo.app_name}</td>
                        <td>{$vo.developer_name}</td>
                        <td><span class="badge bg-secondary">{$vo.category}</span></td>
                        <td>v{$vo.version}</td>
                        <td>{$vo.submit_time}</td>
                        <td>
                            <button onclick="approveApp({$vo.id})" class="btn btn-outline-success btn-sm"><i class="bi bi-check-lg"></i> 通过</button>
                            <button onclick="rejectApp({$vo.id})" class="btn btn-outline-danger btn-sm"><i class="bi bi-x-lg"></i> 拒绝</button>
                        </td>
                    </tr>
                    {/volist}
                </tbody>
            </table>
        </div>
        {$pagination|default=''}
    </div>
</div>
<script>
function approveApp(id) {
    if(!confirm('确定审核通过？')) return;
    $.post('{:url("/admin/platform_app/audit")}', {id: id, result: 'approved'}, function(res){
        if(res.code === 0) location.reload(); else alert(res.msg);
    });
}
function rejectApp(id) {
    var remark = prompt('请输入拒绝原因:');
    if(!remark) return;
    $.post('{:url("/admin/platform_app/audit")}', {id: id, result: 'rejected', remark: remark}, function(res){
        if(res.code === 0) location.reload(); else alert(res.msg);
    });
}
</script>
{/block}
