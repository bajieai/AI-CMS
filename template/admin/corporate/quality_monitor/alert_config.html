{extend name="layout" /}
{block name="title"}告警配置 - AI-CMS{/block}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-gear"></i> 质量监控告警配置</h5></div>
    <div class="card-body">
        <form method="post" action="{:url('/admin/quality_monitor/alertConfig')}">
            <div class="mb-3"><label class="form-label">低质量阈值 (低于此分数触发告警)</label><input type="number" name="low_quality_threshold" class="form-control" value="{$config.low_quality_threshold|default=60}" min="0" max="100"></div>
            <div class="mb-3"><label class="form-label">告警频率</label><select name="alert_frequency" class="form-select">
                <option value="realtime" {if condition="$config.alert_frequency eq 'realtime'"}selected{/if}>实时告警</option>
                <option value="daily" {if condition="$config.alert_frequency eq 'daily'"}selected{/if}>每日汇总</option>
                <option value="weekly" {if condition="$config.alert_frequency eq 'weekly'"}selected{/if}>每周汇总</option>
            </select></div>
            <div class="mb-3"><label class="form-label">通知渠道</label>
                <div class="form-check"><input class="form-check-input" type="checkbox" name="channels[]" value="email" {if condition="in_array('email', $config.channels|default=[])" }checked{/if}> <label class="form-check-label">邮件</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" name="channels[]" value="sms" {if condition="in_array('sms', $config.channels|default=[])" }checked{/if}> <label class="form-check-label">短信</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" name="channels[]" value="in_app" {if condition="in_array('in_app', $config.channels|default=[])" }checked{/if}> <label class="form-check-label">站内信</label></div>
            </div>
            <div class="mb-3"><label class="form-label">通知接收人 (逗号分隔邮箱)</label><input type="text" name="recipients" class="form-control" value="{$config.recipients|default=''}"></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存配置</button>
        </form>
    </div>
</div>
{/block}
