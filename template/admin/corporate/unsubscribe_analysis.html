{extend name="/layout" /}
{block name="title"}退订分析 - AI-CMS{/block}
{block name="content"}
<div class="container-fluid py-4">
    <h4 class="mb-4">📉 退订分析</h4>
    <div class="row mb-4">
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="ovTotal">-</h5><p class="card-text text-muted">总订阅数</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-success" id="ovConfirmed">-</h5><p class="card-text text-muted">已确认</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-warning" id="ovPending">-</h5><p class="card-text text-muted">待确认</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-secondary" id="ovUnsubscribed">-</h5><p class="card-text text-muted">已退订</p></div></div></div>
    </div>
    <div class="row mb-4">
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="ovMonthNew">-</h5><p class="card-text text-muted">本月新增</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title text-danger" id="ovMonthUnsub">-</h5><p class="card-text text-muted">本月退订</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="ovConfirmRate">-</h5><p class="card-text text-muted">确认率</p></div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body"><h5 class="card-title" id="ovUnsubRate">-</h5><p class="card-text text-muted">退订率</p></div></div></div>
    </div>
    <div class="card"><div class="card-header">近30天订阅/退订趋势</div><div class="card-body"><canvas id="trendChart" height="80"></canvas></div></div>
</div>
{/block}
{block name="js"}
<script src="/static/js/Chart.min.js"></script>
<script>
var trendChart=null;
function loadOverview(){$.get('/admin/subscriber/analysis/overview',function(r){var d=r.data||{};$('#ovTotal').text(d.total||0);$('#ovConfirmed').text(d.confirmed||0);$('#ovPending').text(d.pending||0);$('#ovUnsubscribed').text(d.unsubscribed||0);$('#ovMonthNew').text(d.monthNew||0);$('#ovMonthUnsub').text(d.monthUnsub||0);$('#ovConfirmRate').text((d.confirmRate||0)+'%');$('#ovUnsubRate').text((d.unsubRate||0)+'%')})}
function loadTrend(){$.get('/admin/subscriber/analysis/trend',function(r){var d=r.data||{},days=d.days||[],sub=d.subscribed||[],unsub=d.unsubscribed||[];if(trendChart)trendChart.destroy();var ctx=document.getElementById('trendChart').getContext('2d');trendChart=new Chart(ctx,{type:'line',data:{labels:days,datasets:[{label:'新增订阅',data:sub,borderColor:'#0d6efd',backgroundColor:'rgba(13,110,253,0.1)',tension:0.3,fill:true},{label:'退订',data:unsub,borderColor:'#dc3545',backgroundColor:'rgba(220,53,69,0.1)',tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})})}
loadOverview();loadTrend();
</script>
{/block}
