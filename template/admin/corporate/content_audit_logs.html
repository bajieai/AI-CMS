{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0">内容审计日志</h5></div>
    <div class="card-body">
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>名称</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
            {volist name="list" id="vo"}
            <tr><td>{$vo.id}</td><td>{$vo.name}</td><td>{$vo.status}</td><td><a href="#" class="btn btn-sm btn-outline-primary">编辑</a></td></tr>
            {/volist}
            </tbody>
        </table>
        {if empty($list)}<div class="text-center text-muted py-4">暂无数据</div>{/if}
    </div>
</div>
{/block}
