{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-diagram-3 me-1"></i>事件监听器</h5></div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>事件</th><th>监听器</th><th>优先级</th><th>状态</th></tr></thead>
            <tbody>
            {volist name="listeners" id="item"}
            <tr>
                <td><code>{$item.event}</code></td>
                <td>{$item.listener}</td>
                <td>{$item.priority}</td>
                <td>{if $item.active}<span class="badge bg-success">启用</span>{else}<span class="badge bg-secondary">禁用</span>{/if}</td>
            </tr>
            {/volist}
            </tbody>
        </table>
    </div>
</div>
{/block}
