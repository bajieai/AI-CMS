{extend name="layout" /}
{block name="content"}
<div class="card">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-speedometer2 me-1"></i>Hook性能分析</h5></div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>事件</th><th>执行次数</th><th>总耗时(ms)</th><th>平均耗时(ms)</th><th>最慢(ms)</th></tr></thead>
            <tbody>
            {volist name="performance" id="item"}
            <tr>
                <td><code>{$item.event}</code></td>
                <td>{$item.count}</td>
                <td>{$item.total_time}</td>
                <td>{$item.avg_time}</td>
                <td>{$item.max_time}</td>
            </tr>
            {/volist}
            </tbody>
        </table>
    </div>
</div>
{/block}
