                            <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="capabilities[]" value="ai_qa" id="cap_qa" {if in_array('ai_qa',$caps)}checked{/if}><label class="form-check-label" for="cap_qa">智能问答</label></div></div>

{block name="js"}
<script>
$(function(){
    $('#btnSave').click(function(){
        var data = {};
        $('#agentForm').serializeArray().forEach(function(item){
            if(item.name === 'max_autonomous_actions'){
                data[item.name] = parseInt(item.value);
            }else if(item.name === 'capabilities[]'){
                if(!data.capabilities) data.capabilities = [];
                data.capabilities.push(item.value);
            }else{
                data[item.name] = item.value;
            }
        });
        if(!data.capabilities) data.capabilities = [];
        data.status = $('#swStatus').is(':checked') ? 1 : 0;
        ajaxPost('/admin/ai_agent/edit?id={$agent.id}', data, function(d){
            $.toast(d.msg, d.code===0?'success':'danger');
            if(d.code===0) setTimeout(function(){location.href='/admin/ai_agent/index'},800);
        });
    });

    $('#btnDelete').click(function(){
        if(!confirm('确定删除此智能体？此操作不可恢复。')) return;
        ajaxPost('/admin/ai_agent/delete', {id: '{$agent.id}'}, function(d){
            $.toast(d.msg, d.code===0?'success':'danger');
            if(d.code===0) setTimeout(function(){location.href='/admin/ai_agent/index'},800);
        });
    });
});
</script>
{/block}
