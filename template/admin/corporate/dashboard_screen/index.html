{extend name="layout" /}
{block name="title"}数据可视化大屏{/block}
{block name="breadcrumb"}<li class="breadcrumb-item active">数据可视化大屏</li>{/block}
{block name="content"}
<div class="mb-3">
    <button class="btn btn-outline-primary screen-btn active" data-id="1">内容运营</button>
    <button class="btn btn-outline-primary screen-btn" data-id="2">用户运营</button>
    <button class="btn btn-outline-primary screen-btn" data-id="3">收入运营</button>
</div>
<div class="card">
    <div class="card-header"><i class="bi bi-display me-1"></i>大屏数据</div>
    <div class="card-body" id="screenData">
        <pre class="bg-light p-3 rounded">{$data|json_encode}</pre>
    </div>
</div>
{/block}
