{extend name="layout" /}
{block name="title"}数据导出{/block}

{block name="content"}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-file-earmark-arrow-down me-2"></i>数据导出</h4>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form id="exportForm">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">导出模块</label>
                        <select name="module" class="form-select" id="exportModule">
                            <option value="content">内容管理</option>
                            <option value="member">会员管理</option>
                            <option value="order">付费订单</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">导出格式</label>
                        <select name="format" class="form-select">
                            <option value="xlsx">Excel (.xlsx)</option>
                            <option value="csv">CSV (.csv)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">状态</label>
                        <select name="filters[status]" class="form-select">
                            <option value="">全部</option>
                            <option value="2">已发布</option>
                            <option value="1">待审</option>
                            <option value="0">草稿</option>
                            <option value="-1">已删除</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">开始日期</label>
                        <input type="date" name="filters[start_date]" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">结束日期</label>
                        <input type="date" name="filters[end_date]" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">选择字段</label>
                    <div class="row" id="fieldContainer"></div>
                </div>

                <div class="text-end">
                    <button type="button" class="btn btn-primary" id="btnExport">
                        <i class="bi bi-download"></i> 开始导出
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script>
var fieldOptions = {
    content: [
        {value:'id',label:'ID',checked:true},{value:'title',label:'标题',checked:true},
        {value:'cate_name',label:'分类',checked:true},{value:'type',label:'类型',checked:true},
        {value:'status',label:'状态',checked:true},{value:'views',label:'浏览量',checked:true},
        {value:'like_count',label:'点赞数',checked:false},{value:'comment_count',label:'评论数',checked:false},
        {value:'create_time',label:'创建时间',checked:true},{value:'update_time',label:'更新时间',checked:false},
    ],
    member: [
        {value:'id',label:'ID',checked:true},{value:'username',label:'用户名',checked:true},
        {value:'nickname',label:'昵称',checked:true},{value:'phone',label:'手机号',checked:false},
        {value:'email',label:'邮箱',checked:false},{value:'points',label:'积分',checked:true},
        {value:'total_points',label:'总积分',checked:true},{value:'level_name',label:'等级',checked:true},
        {value:'create_time',label:'创建时间',checked:true},
    ],
    order: [
        {value:'order_sn',label:'订单号',checked:true},{value:'member_id',label:'会员ID',checked:true},
        {value:'content_id',label:'内容ID',checked:true},{value:'type',label:'类型',checked:true},
        {value:'price',label:'金额',checked:true},{value:'pay_type',label:'支付方式',checked:true},
        {value:'status',label:'状态',checked:true},{value:'paid_at',label:'支付时间',checked:true},
        {value:'create_time',label:'创建时间',checked:false},
    ],
};
function renderFields(module) {
    var fields = fieldOptions[module] || [];
    var html = '';
    fields.forEach(function(f) {
        html += '<div class="col-md-3 col-sm-4 mb-2"><div class="form-check">' +
            '<input class="form-check-input" type="checkbox" name="fields[]" value="' + f.value + '" id="fld_' + f.value + '"' + (f.checked ? ' checked' : '') + '>' +
            '<label class="form-check-label" for="fld_' + f.value + '">' + f.label + '</label></div></div>';
    });
    $('#fieldContainer').html(html);
}
$(function() {
    renderFields('content');
    $('#exportModule').on('change', function() { renderFields($(this).val()); });
    $('#btnExport').on('click', function() {
        var $btn = $(this);
        $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> 导出中...');
        window.location.href = '/admin/export/advanced?' + $('#exportForm').serialize();
        setTimeout(function() { $btn.prop('disabled', false).html('<i class="bi bi-download"></i> 开始导出'); }, 2000);
    });
});
</script>
{/block}
