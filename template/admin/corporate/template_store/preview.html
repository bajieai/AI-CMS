{extend name="layout" /}

{block name="title"}预览 - {$info.name}{/block}

{block name="breadcrumb"}
<li class="breadcrumb-item"><a href="/admin/template_store/market">模板市场</a></li>
<li class="breadcrumb-item active">预览 - {$info.name}</li>
{/block}

{block name="content"}
<style>
.preview-bar {
    background: #1e293b;
    color: #fff;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 8px 8px 0 0;
}
.preview-bar .device-btns .btn {
    color: #cbd5e1;
    border-color: #475569;
    padding: 2px 10px;
    font-size: 12px;
}
.preview-bar .device-btns .btn.active {
    background: #475569;
    color: #fff;
}
.preview-frame {
    border: none;
    width: 100%;
    height: calc(100vh - 200px);
    background: #fff;
    border-radius: 0 0 8px 8px;
}
.preview-frame.mobile {
    width: 375px;
    margin: 0 auto;
    display: block;
    border-left: 1px solid #e2e8f0;
    border-right: 1px solid #e2e8f0;
}
</style>

<div class="card border-0 shadow-sm">
    <div class="preview-bar">
        <div class="d-flex align-items-center">
            <i class="bi bi-eye me-2"></i>
            <span class="fw-medium">{$info.name}</span>
            <span class="ms-3 small text-muted">{$info.slug}</span>
        </div>
        <div class="device-btns">
            <button type="button" class="btn btn-sm btn-outline-secondary active" onclick="setDevice('desktop', this)"><i class="bi bi-laptop me-1"></i>桌面</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setDevice('mobile', this)"><i class="bi bi-phone me-1"></i>手机</button>
            <a href="/admin/template_store/detail/{$info.id}" class="btn btn-sm btn-outline-light ms-2"><i class="bi bi-x-lg"></i></a>
        </div>
    </div>
    <iframe id="previewFrame" class="preview-frame" src="{$preview_url}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<script>
function setDevice(device, btn) {
    const frame = document.getElementById('previewFrame');
    document.querySelectorAll('.device-btns .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (device === 'mobile') {
        frame.classList.add('mobile');
    } else {
        frame.classList.remove('mobile');
    }
}
</script>
{/block}
