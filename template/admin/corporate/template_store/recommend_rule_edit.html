{extend name="layout" /}
{block name="content"}
<div class="container-fluid px-4">
    <h4 class="mt-4 mb-3">{if $id > 0}编辑推荐规则{else /}添加推荐规则{/if}</h4>

    <div class="card mb-4">
        <div class="card-body">
            <form method="post" action="/admin/template_store_ops/recommendRuleEdit/{$id}">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">规则名称 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required value="{$rule.name|default=''}" placeholder="如：首页精选推荐">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">规则类型 <span class="text-danger">*</span></label>
                        <select name="rule_type" class="form-select" required id="ruleType">
                            {foreach $ruleTypes as $key => $label}
                            <option value="{$key}" {if ($rule.rule_type|default='manual')==$key}selected{/if}>{$label}</option>
                            {/foreach}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">A/B测试分组</label>
                        <select name="ab_group" class="form-select">
                            <option value="ALL" {if ($rule.ab_group|default='A')=='ALL'}selected{/if}>全部分组</option>
                            <option value="A" {if ($rule.ab_group|default='A')=='A'}selected{/if}>A组</option>
                            <option value="B" {if ($rule.ab_group|default='')=='B'}selected{/if}>B组</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">优先级</label>
                        <input type="number" name="priority" class="form-control" value="{$rule.priority|default=10}" min="0">
                        <small class="text-muted">数字越大越优先</small>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">排序</label>
                        <input type="number" name="sort" class="form-control" value="{$rule.sort|default=100}" min="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">关联分类</label>
                        <select name="category_id" class="form-select">
                            <option value="0">不关联分类</option>
                            {volist name="categories" id="cat"}
                            <option value="{$cat.id}" {if ($rule.category_id|default=0)==$cat.id}selected{/if}>{$cat.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-select">
                            <option value="1" {if ($rule.status|default=1)==1}selected{/if}>启用</option>
                            <option value="0" {if ($rule.status|default=1)==0}selected{/if}>禁用</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">生效开始时间</label>
                        <input type="datetime-local" name="start_time" class="form-control" value="{$rule.start_time|default=''}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">生效结束时间</label>
                        <input type="datetime-local" name="end_time" class="form-control" value="{$rule.end_time|default=''}">
                    </div>
                </div>

                <div class="mb-3" id="templateIdsGroup">
                    <label class="form-label">手动指定模板ID列表</label>
                    <textarea name="template_ids" class="form-control" rows="3" placeholder='输入模板ID，逗号分隔，如: [1, 5, 12]'>{:json_encode($rule.template_ids ?? [])}</textarea>
                    <small class="text-muted">仅手动置顶/节日特推类型需要填写，JSON数组格式</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">触发条件（JSON）</label>
                    <textarea name="conditions" class="form-control" rows="2" placeholder='{"user_tags":["vip"], "device":"mobile"}'>{:json_encode($rule.conditions ?? [])}</textarea>
                    <small class="text-muted">可选，高级条件过滤</small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>保存</button>
                    <a href="/admin/template_store_ops/recommendRuleIndex" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// 根据规则类型控制模板ID字段显示
function toggleTemplateIds() {
    var type = document.getElementById('ruleType').value;
    var group = document.getElementById('templateIdsGroup');
    group.style.display = (type === 'manual' || type === 'festival') ? 'block' : 'none';
}
document.getElementById('ruleType').addEventListener('change', toggleTemplateIds);
toggleTemplateIds();
</script>
{/block}
