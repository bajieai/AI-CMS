{extend name="layout" /}

{block name="title"}已购内容{/block}

{block name="content"}
<div class="m-content">
    <h4 style="font-size:17px;font-weight:700;margin-bottom:12px;"><i class="bi bi-bag-check me-2"></i>已购内容</h4>

    {volist name="list" id="vo"}
    <div class="m-card">
        {if condition="$vo.cover"}<img src="{$vo.cover}" class="m-card-img" alt="" onerror="this.style.display='none'" style="max-height:130px;object-fit:cover;">{/if}
        <div class="m-card-body">
            <h6 class="m-card-tit"><a href="{$vo.url}">{$vo.title}</a></h6>
            <p class="m-card-text">{$vo.excerpt|msubstr=0,45}</p>
            <span class="m-badge m-badge-primary">{$vo.price} 积分</span>
            <small class="text-muted float-end" style="font-size:11.5px;">{$vo.create_time|date='Y-m-d'}</small>
        </div>
    </div>
    {/volist}

    {empty name="list"}
    <div class="m-empty"><i class="bi bi-bag"></i><p>暂无已购内容</p></div>
    {/empty}
</div>
{/block}
