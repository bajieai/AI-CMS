{extend name="layout" /}

{block name="title"}会员登录{/block}

{block name="content"}
<div class="m-content">
    <div class="m-card" style="padding:24px 18px;margin-top:10px;">
        <h4 class="text-center mb-4" style="font-size:18px;font-weight:700;">会员登录</h4>
        <form id="loginForm">
            <div class="m-form-group">
                <label style="font-size:13px;font-weight:550;color:#555;display:block;margin-bottom:4px;">用户名 / 邮箱</label>
                <input type="text" name="username" class="m-form-control" placeholder="请输入用户名或邮箱" required>
            </div>
            <div class="m-form-group">
                <label style="font-size:13px;font-weight:550;color:#555;display:block;margin-bottom:4px;">密码</label>
                <input type="password" name="password" class="m-form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="m-btn m-btn-primary" style="margin-top:6px;">登 录</button>
        </form>
        <div class="text-center mt-3"><a href="/member/register" style="font-size:13.5px;color:#0d6efd;text-decoration:none;">还没有账号？立即注册</a></div>
    </div>
</div>
{/block}
{block name="js"}
<script>$('#loginForm').on('submit',function(e){e.preventDefault();$.post('/member/login',$(this).serialize(),function(r){if(r.success){if('serviceWorker'in navigator&&navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'CLEAR_PAGES'});}location.href='/member/profile';}else showToast(r.msg||'登录失败','danger');});});</script>
{/block}
