<!-- V2.9.22 F-1: 案例型列表项（移动端） -->
<div class="card mb-3 case-card">
    {if condition="$vo.cover"}
    <img data-src="{$vo.cover}" class="card-img-top lazyload" alt="{$vo.title}" onerror="this.style.display='none'" style="max-height:200px;object-fit:cover;" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    {/if}
    <div class="card-body">
        <h5 class="card-title" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <a href="{$vo.url}" class="text-decoration-none">{$vo.title}</a>
            {include file="shared/paid_badge" /}
        </h5>
        <p class="card-text text-muted small">{$vo.excerpt|msubstr=0,100}</p>
    </div>
    <div class="card-footer bg-transparent d-flex justify-content-between align-items-center">
        <small class="text-muted"><i class="bi bi-eye me-1"></i>{$vo.views|default=0} · {$vo.create_time|date='Y-m-d'}</small>
        <a href="{$vo.url}" class="btn btn-sm btn-outline-primary w-100">查看案例</a>
    </div>
</div>
