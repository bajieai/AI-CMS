{extend name="layout" /}

{block name="title"}个人中心{/block}

{block name="content"}
<div class="m-content">
    <div class="m-card text-center" style="padding:20px 16px;">
        <div style="width:60px;height:60px;border-radius:50%;overflow:hidden;margin:0 auto 10px;border:2px solid #e2e8f0;">
            <img id="avatarPreview" src="{$member.avatar|default='/assets/img/default-avatar.png'}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='/assets/img/default-avatar.png'">
        </div>
        <button type="button" class="btn btn-sm btn-outline-primary" onclick="document.getElementById('avatarInput').click()" style="font-size:12px;">
            <i class="bi bi-camera me-1"></i>更换头像
        </button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <h5 style="font-size:17px;font-weight:700;margin-bottom:2px;margin-top:8px;">{$member.nickname}</h5>
        <small class="text-muted">@{$member.username}</small>
    </div>

    <div class="m-card" style="padding:18px 14px;">
        <form id="profileForm">
            <input type="hidden" name="avatar" id="avatarField" value="{$member.avatar|default=''}">
            <div class="m-form-group">
                <label style="font-size:12.5px;color:#888;font-weight:550;display:block;margin-bottom:3px;">用户名（不可修改）</label>
                <input type="text" class="m-form-control" value="{$member.username}" disabled style="background:#f5f5f5;">
            </div>
            <div class="m-form-group">
                <label style="font-size:12.5px;color:#888;font-weight:550;display:block;margin-bottom:3px;">昵称</label>
                <input type="text" name="nickname" class="m-form-control" value="{$member.nickname}">
            </div>
            <div class="m-form-group">
                <label style="font-size:12.5px;color:#888;font-weight:550;display:block;margin-bottom:3px;">邮箱</label>
                <input type="email" class="m-form-control" value="{$member.email}" disabled style="background:#f5f5f5;">
            </div>
            <button type="submit" class="m-btn m-btn-primary">保存修改</button>
        </form>
    </div>

    <div class="text-center mt-3">
        <a href="/member/logout" style="color:#dc3545;text-decoration:none;font-size:13.5px;"><i class="bi bi-box-arrow-right me-1"></i>退出登录</a>
    </div>
</div>
{/block}
{block name="js"}
<script>
function uploadAvatar(input) {
    var file = input.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/member/uploadAvatar',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 0 && res.data && res.data.url) {
                $('#avatarField').val(res.data.url);
                $('#avatarPreview').attr('src', res.data.url);
                showToast('头像上传成功', 'success');
            } else {
                showToast(res.msg || '上传失败', 'danger');
            }
        },
        error: function() { showToast('网络错误', 'danger'); }
    });
    input.value = '';
}
$('#profileForm').on('submit',function(e){e.preventDefault();$.post('/member/profile',$(this).serialize(),function(r){showToast(r.msg||'保存成功','success');});});
</script>
{/block}
