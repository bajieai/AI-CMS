{extend name="layout" /}

{block name="title"}聊天 - {$site_name}{/block}

{block name="content"}
<section class="py-4">
    <div class="container" style="max-width:720px;">
        <div class="d-flex align-items-center mb-3">
            <a href="/message/index" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left"></i></a>
            <h5 class="mb-0">聊天</h5>
        </div>
        <div class="card">
            <div class="card-body" style="max-height:500px;overflow-y:auto;" id="chatBox">
                {volist name="messages" id="vo"}
                <div class="d-flex mb-3 {if $vo.from_user_id == $member_info.id}justify-content-end{/if}">
                    <div class="p-2 rounded {if $vo.from_user_id == $member_info.id}bg-primary text-white{else}bg-light{/if}" style="max-width:75%;">
                        <div class="small">{$vo.content}</div>
                        <div class="text-end"><small class="{if $vo.from_user_id == $member_info.id}text-white-50{else}text-muted{/if}" style="font-size:.7rem;">{$vo.create_time|date='H:i'}</small></div>
                    </div>
                </div>
                {/volist}
            </div>
            <div class="card-footer">
                <form id="chatForm" class="d-flex gap-2">
                    <input type="text" id="chatInput" class="form-control" placeholder="输入消息..." autocomplete="off">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i></button>
                </form>
            </div>
        </div>
    </div>
</section>

<script>
var otherUserId = {$other_user_id|default=0};
var chatBox = document.getElementById('chatBox');
if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
document.getElementById('chatForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var input = document.getElementById('chatInput');
    var content = input.value.trim();
    if(!content) return;
    fetch('/message/send', {
        method: 'POST',
        headers: {'Content-Type':'application/x-www-form-urlencoded'},
        body: 'to_user_id=' + otherUserId + '&content=' + encodeURIComponent(content)
    }).then(function(r){return r.json();}).then(function(res){
        if(res.code === 0){ location.reload(); }
        else{ alert(res.msg || '发送失败'); }
    });
});
</script>
{/block}
