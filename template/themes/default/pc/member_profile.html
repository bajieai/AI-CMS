{extend name="layout" /}

{block name="title"}个人中心{/block}

{block name="content"}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">个人中心</h4>
                    <form id="profileForm">
                        <!-- 头像 -->
                        <div class="text-center mb-4">
                            <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 10px;border:2px solid #e2e8f0;">
                                <img id="avatarPreview" src="{$member.avatar|default='/assets/img/default-avatar.png'}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='/assets/img/default-avatar.png'">
                            </div>
                            <div>
                                <button type="button" class="btn btn-sm btn-outline-primary" onclick="document.getElementById('avatarInput').click()">
                                    <i class="bi bi-camera me-1"></i>更换头像
                                </button>
                                <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                            </div>
                            <input type="hidden" name="avatar" id="avatarField" value="{$member.avatar|default=''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" value="{$member.username}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">昵称</label>
                            <input type="text" name="nickname" class="form-control" value="{$member.nickname}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" value="{$member.email}" disabled>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/member/logout" class="text-decoration-none small text-danger">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="js"}
<script>
function uploadAvatar(input) {
    var file = input.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/member/uploadAvatar',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 0 && res.data && res.data.url) {
                $('#avatarField').val(res.data.url);
                $('#avatarPreview').attr('src', res.data.url);
                showToast('头像上传成功', 'success');
            } else {
                showToast(res.msg || '上传失败', 'danger');
            }
        },
        error: function() { showToast('网络错误', 'danger'); }
    });
    input.value = '';
}
$('#profileForm').on('submit', function(e) {
    e.preventDefault();
    $.post('/member/profile', $(this).serialize(), function(res) {
        alert(res.msg || '已更新');
    });
});
</script>
{/block}
