<!-- V2.9.21 D-4: 下载型列表项 -->
<div class="col-md-6">
    <div class="card h-100 download-card">
        <div class="card-body">
            <div class="d-flex align-items-start gap-3">
                <div class="download-icon flex-shrink-0">
                    <i class="bi bi-file-earmark-arrow-down fs-1 text-primary"></i>
                </div>
                <div class="flex-grow-1">
                    <h5 class="card-title mb-1" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                        <a href="{$vo.url}" class="text-decoration-none">{$vo.title}</a>
                        {include file="shared/paid_badge" /}
                    </h5>
                    <p class="card-text text-muted small mb-2">{$vo.excerpt|msubstr=0,80}</p>
                    <div class="d-flex gap-3 text-muted small">
                        <span><i class="bi bi-download me-1"></i>{$vo.download_count|default=0} 次下载</span>
                        <span><i class="bi bi-calendar3 me-1"></i>{$vo.create_time|date='Y-m-d'}</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer bg-transparent">
            <a href="{$vo.url}" class="btn btn-sm btn-primary w-100"><i class="bi bi-download me-1"></i>立即下载</a>
        </div>
    </div>
</div>
