{extend name="layout" /}

{block name="title"}签到积分记录{/block}

{block name="content"}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm" style="border:none;border-radius:12px">
                <div class="card-header d-flex justify-content-between align-items-center" style="background:transparent;border-bottom:1px solid #e2e8f0;font-weight:600">
                    <span><i class="bi bi-clock-history me-1"></i>签到积分明细</span>
                    <a href="/signin" class="btn btn-sm btn-primary" style="border-radius:50px"><i class="bi bi-calendar-check me-1"></i>去签到</a>
                </div>
                <div class="list-group list-group-flush">
                    {volist name="list" id="vo"}
                    <div class="list-group-item d-flex justify-content-between align-items-center px-4 py-3">
                        <div>
                            <div style="font-weight:500;font-size:.9rem">
                                <i class="bi bi-calendar-check text-success me-1"></i>{$vo.note|default='签到'}
                            </div>
                            <div class="text-muted" style="font-size:.78rem">{$vo.create_time|date='Y-m-d H:i'}</div>
                        </div>
                        <div style="font-weight:700;color:#43e97b">+{$vo.points}</div>
                    </div>
                    {/volist}
                    {empty name="list"}
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-3 d-block mb-2"></i>暂无签到记录
                    </div>
                    {/empty}
                </div>
            </div>

            {$list|raw}
        </div>
    </div>
</div>
{/block}
