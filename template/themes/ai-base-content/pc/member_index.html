{extend name="layout" /}

{block name="title"}用户中心 - {$site_name}{/block}

{block name="content"}
<section class="section">
    <div class="container">
        <div class="row">
            <div class="col-lg-3 mb-3">
                <div class="card sidebar-card">
                    <div class="card-body text-center">
                        <img src="{$member_info.avatar|default='/assets/img/default-avatar.png'}" class="rounded-circle mb-2" width="64" alt="avatar">
                        <h6>{$member_info.nickname|default='用户'}</h6>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="/member/index" class="list-group-item list-group-item-action active"><i class="bi bi-house-door me-2"></i>个人首页</a>
                        <a href="/member/profile" class="list-group-item list-group-item-action"><i class="bi bi-person me-2"></i>个人资料</a>
                        <a href="/member/favorite" class="list-group-item list-group-item-action"><i class="bi bi-heart me-2"></i>我的收藏</a>
                        <a href="/member/orders" class="list-group-item list-group-item-action"><i class="bi bi-cart me-2"></i>我的订单</a>
                        <a href="/member/logout" class="list-group-item list-group-item-action text-danger"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="card">
                    <div class="card-body">
                        <h5>欢迎回来，{$member_info.nickname|default='用户'}！</h5>
                        <p class="text-muted">这里是您的个人中心，您可以管理个人资料、收藏和订单。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{/block}
