<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$site_title|default='文艺清新博客'}</title>
    <meta name="description" content="{$site_description|default='一个记录文字与思考的个人博客'}">
    <link rel="stylesheet" href="{$skin}css/style.css">
    <link rel="icon" href="{$skin}images/favicon.ico">
</head>
<body>
    <header class="header" id="header">
        <div class="container header__inner">
            <a href="/" class="header__logo">
                <span class="header__logo-icon">🌿</span>
                <span class="header__logo-text">{$site_name|default='文艺清新'}</span>
            </a>
            <nav class="header__nav" id="nav">
                <ul class="header__nav-list">
                    <li class="header__nav-item"><a href="/" class="header__nav-link">首页</a></li>
                    <li class="header__nav-item"><a href="/list" class="header__nav-link">文章</a></li>
                    <li class="header__nav-item"><a href="/about" class="header__nav-link">关于</a></li>
                </ul>
            </nav>
            <button class="header__menu-btn" id="menuBtn" aria-label="菜单">
                <span class="header__menu-line"></span>
                <span class="header__menu-line"></span>
                <span class="header__menu-line"></span>
            </button>
        </div>
    </header>
    <main class="main">
        {block name="content"}默认内容{/block}
    </main>
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__text">{$powered_by|raw} {$copyright_info}</p>
        </div>
    </footer>
    <script src="{$skin}js/main.js"></script>
        <script>
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    // Only target primary nav links (inside lists), exclude brand/home logo
    document.querySelectorAll('header nav a[href], .navbar-nav a.nav-link').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && path === href) {
            el.classList.add('active');
        }
    });
});
</script>
</body>
</html>
