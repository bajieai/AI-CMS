{extend name="layout" /}

{block name="title"}登录 - {$site_name}{/block}

{block name="content"}
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4">登录</h4>
                        <form id="loginForm" action="/member/login" method="post">
                            <input type="hidden" name="__token__" value="{:token()}">
                            <div class="mb-3">
                                <label class="form-label">账号</label>
                                <input type="text" name="username" class="form-control" required placeholder="用户名/手机号/邮箱">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" name="password" class="form-control" required placeholder="密码">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">记住我</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登录</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/member/register" class="small">没有账号？立即注册</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{/block}
