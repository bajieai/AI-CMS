<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{$site_name|default='学术绿韵'}</title>
    <meta name="keywords" content="{$site_keywords|default='在线课程,教育培训,学术'}">
    <meta name="description" content="{$site_description|default='学术严谨的在线教育平台'}">
    <link rel="stylesheet" href="/assets/css/style.css">
    </head>
<body>
    <!-- 移动端头部 -->
    <header class="mobile-header">
        <div class="container">
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="logo">
                <a href="/">
                    <img src="/assets/placeholder/logo.png" alt="{$site_name|default='学术绿韵'}">
                </a>
            </div>
            <a href="/search" class="search-btn">搜索</a>
        </div>
    </header>

    <!-- 移动端导航菜单 -->
    <nav class="mobile-nav" id="mobileNav">
        <ul>
            <li><a href="/" {if $current_page == 'index'}class="active"{/if}>首页</a></li>
            <li><a href="/course" {if $current_page == 'list'}class="active"{/if}>课程中心</a></li>
            <li><a href="/about">关于我们</a></li>
            <li><a href="/contact">联系我们</a></li>
            <li class="nav-divider"></li>
            <li><a href="/login">登录</a></li>
            <li><a href="/register">注册</a></li>
        </ul>
    </nav>

    <!-- 主内容区域 -->
    <main class="main">
        {block name="content"}{/block}
    </main>

    <!-- 移动端底部 -->
    <footer class="mobile-footer">
        <div class="container">
            <p>&copy; 2024 {$site_name|default='学术绿韵'} All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
        <script>
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    // Only target primary nav links (inside lists), exclude brand/home logo
    document.querySelectorAll('header nav a[href], .navbar-nav a.nav-link').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && path === href) {
            el.classList.add('active');
        }
    });
});
</script>
</body>
</html>
