<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{$site_name|default='红色资讯'}</title>
    <meta name="keywords" content="{$site_keywords|default='新闻,资讯,红色,门户'}">
    <meta name="description" content="{$site_description|default='红色资讯门户，为您提供最新最热的新闻资讯'}">
    <link rel="stylesheet" href="/assets/css/style.css">
    </head>
<body>
    <!-- 移动端顶部 -->
    <header class="mobile-header">
        <div class="container">
            <div class="header-inner">
                <button class="menu-toggle" id="mobileMenuToggle">☰</button>
                <div class="logo">
                    <a href="/">
                        <img src="/assets/placeholder/logo-mobile.png" alt="{$site_name|default='红色资讯'}">
                    </a>
                </div>
                <button class="search-toggle" id="searchToggle">🔍</button>
            </div>
        </div>
        <!-- 移动端菜单 -->
        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><a href="/" class="active">首页</a></li>
                {volist name="nav_list" id="nav"}
                <li><a href="{$nav.url}">{$nav.title}</a></li>
                {/volist}
            </ul>
            <div class="mobile-search">
                <form action="/search" method="get">
                    <input type="text" name="keyword" placeholder="搜索资讯...">
                    <button type="submit">搜索</button>
                </form>
            </div>
        </nav>
    </header>

    <!-- 主要内容 -->
    <main class="main-content">
        {block name="content"}{/block}
    </main>

    <!-- 移动端底部 -->
    <footer class="mobile-footer">
        <div class="container">
            <p>{$powered_by|raw} {$copyright_info}</p>
            <p>备案号：{$site_icp|default='京ICP备00000000号'}</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
        <script>
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    // Only target primary nav links (inside lists), exclude brand/home logo
    document.querySelectorAll('header nav a[href], .navbar-nav a.nav-link').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && path === href) {
            el.classList.add('active');
        }
    });
});
</script>
</body>
</html>
