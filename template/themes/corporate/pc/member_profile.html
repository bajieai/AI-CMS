{extend name="layout" /}

{block name="title"}个人中心{/block}

{block name="content"}

<div class="section-padding" style="padding-top:2.5rem;">
    <div class="container" style="max-width:900px;">
        <!-- 用户信息卡（深色渐变） -->
        <div style="background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border-radius:16px;padding:2.5rem;margin-bottom:2rem;color:#fff;position:relative;overflow:hidden;">
            <div style="position:absolute;top:-40px;right:-20px;width:140px;height:140px;background:rgba(59,130,246,.12);border-radius:50%;"></div>
            <div class="row align-items-center position-relative" style="z-index:1;">
                <div class="col-auto me-4">
                    <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--color-accent),#6366f1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 6px 24px rgba(59,130,246,.35);">
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>
                <div class="col flex-grow-1">
                    <h3 class="fw-bold mb-1" style="font-size:1.4rem;">{$member.nickname|default=$member.username}</h3>
                    <p class="opacity-70 mb-0 small">{$member.email} &middot; ID: {$member.id}</p>
                </div>
                <div class="col-auto text-end">
                    <span class="badge rounded-pill px-3 py-2" style="background:rgba(255,255,255,.14);font-size:.84rem;font-weight:600;">Lv.1 会员</span>
                </div>
            </div>
        </div>
        <!-- 编辑表单 -->
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0" style="border-radius:var(--radius-card);box-shadow:var(--shadow-card);">
                    <div style="padding:1.75rem 2rem;border-bottom:1px solid #f1f5f9;">
                        <h5 class="mb-0 fw-bold" style="color:#1e293b;"><i class="bi bi-gear me-2" style="color:var(--color-accent);"></i>基本信息</h5>
                    </div>
                    <div class="p-4">
                        <form id="profileForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small" style="color:#64748b;">用户名（不可修改）</label>
                                <input type="text" class="form-control" value="{$member.username}" disabled
                                       style="border-radius:10px;background:#f8fafc;border-color:#e2e8f0;">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold small" style="color:#64748b;">昵称</label>
                                <input type="text" name="nickname" class="form-control" value="{$member.nickname}" style="border-radius:10px;border-color:#e2e8f0;">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold small" style="color:#64748b;">邮箱（不可修改）</label>
                                <input type="email" class="form-control" value="{$member.email}" disabled
                                       style="border-radius:10px;background:#f8fafc;border-color:#e2e8f0;">
                            </div>
                            <button type="submit" class="btn px-4" style="background:var(--color-accent);color:#fff;border-radius:var(--radius-btn);font-weight:700;">
                                <i class="bi bi-check-lg me-1"></i>保存修改
                            </button>
                        </form>
                        <hr class="my-4" style="border-color:#f1f5f9;">
                        <div class="text-center">
                            <a href="/member/logout" class="text-danger text-decoration-none small fw-bold"><i class="bi bi-box-arrow-right me-1"></i>退出登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
$('#profileForm').on('submit', function(e) { e.preventDefault(); $.post('/member/profile', $(this).serialize(), function(res) { alert(res.msg || '已更新'); }); });
</script>
{/block}
