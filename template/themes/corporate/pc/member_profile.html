{extend name="layout" /}

{block name="title"}中汉中績{/block}

{block name="content"}

<div class="section-padding" style="padding-top:2.5rem;">
    <div class="container" style="max-width:900px;">
        <!-- 用户淇℃伅卡★紙娣辫壊娓愬彉）-->
        <div style="background:linear-gradient(135deg,var(--i8j-text,#1e293b) 0%,var(--i8j-text,#334155) 100%);border-radius:16px;padding:2rem;margin-bottom:2rem;color:#fff;position:relative;overflow:hidden;">
            <div style="position:absolute;top:-40px;right:-20px;width:140px;height:140px;background:rgba(59,130,246,.12);border-radius:50%;"></div>
            <div class="row align-items-center position-relative" style="z-index:1;">
                <div class="col-auto me-4">
                    <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.3);">
                        <img id="avatarPreview" src="{$member.avatar|default='/assets/img/default-avatar.png'}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='/assets/img/default-avatar.png'">
                    </div>
                </div>
                <div class="col flex-grow-1">
                    <h3 class="fw-bold mb-1" style="font-size:1.4rem;">{$member.nickname|default=$member.username}</h3>
                    <p class="opacity-70 mb-0 small">{$member.email} &middot; ID: {$member.id}</p>
                    <button type="button" class="btn btn-sm mt-2" style="background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:20px;" onclick="document.getElementById('avatarInput').click()">
                        <i class="bi bi-camera me-1"></i>鏇存崲头像
                    </button>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                </div>
            </div>
        </div>
        <!-- 编辑琛ㄥ崟 -->
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0" style="border-radius:var(--radius-card);box-shadow:var(--shadow-card);">
                    <div style="padding:1.75rem 2rem;border-bottom:1px solid #f1f5f9;">
                        <h5 class="mb-0 fw-bold" style="color:var(--i8j-text,#1e293b);"><i class="bi bi-gear me-2" style="color:var(--color-accent);"></i>鍩烘湰淇℃伅</h5>
                    </div>
                    <div class="p-4">
                        <form id="profileForm">
                            <input type="hidden" name="avatar" id="avatarField" value="{$member.avatar|default=''}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small" style="color:var(--i8j-text-secondary,#64748b);">用户名（不可修改）</label>
                                <input type="text" class="form-control" value="{$member.username}" disabled
                                       style="border-radius:10px;background:var(--i8j-bg-secondary,#f8fafc);border-color:var(--i8j-border,#e2e8f0);">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold small" style="color:var(--i8j-text-secondary,#64748b);">是电О</label>
                                <input type="text" name="nickname" class="form-control" value="{$member.nickname}" style="border-radius:10px;border-color:var(--i8j-border,#e2e8f0);">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold small" style="color:var(--i8j-text-secondary,#64748b);">邮（不可修改）</label>
                                <input type="email" class="form-control" value="{$member.email}" disabled
                                       style="border-radius:10px;background:var(--i8j-bg-secondary,#f8fafc);border-color:var(--i8j-border,#e2e8f0);">
                            </div>
                            <button type="submit" class="btn px-4" style="background:var(--color-accent);color:#fff;border-radius:var(--radius-btn);font-weight:700;">
                                <i class="bi bi-check-lg me-1"></i>保存修改
                            </button>
                        </form>
                        <hr class="my-4" style="border-color:var(--i8j-border,#f1f5f9);">
                        <div class="text-center">
                            <a href="/member/logout" class="text-danger text-decoration-none small fw-bold"><i class="bi bi-box-arrow-right me-1"></i>退出登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
function uploadAvatar(input) {
    var file = input.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/member/uploadAvatar',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 0 && res.data && res.data.url) {
                $('#avatarField').val(res.data.url);
                $('#avatarPreview').attr('src', res.data.url);
                showToast('头像上传成功', 'success');
            } else {
                showToast(res.msg || '上传失败', 'danger');
            }
        },
        error: function() { showToast('网络错误', 'danger'); }
    });
    input.value = '';
}
$('#profileForm').on('submit', function(e) { e.preventDefault(); $.post('/member/profile', $(this).serialize(), function(res) { alert(res.msg || '宸叉洿鏂?); }); });
</script>
{/block}
