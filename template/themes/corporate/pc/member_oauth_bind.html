{extend name="layout" /}

{block name="title"}第三方账号绑定{/block}

{block name="content"}

<div class="section-padding" style="padding-top:2.5rem;">
    <div class="container" style="max-width:700px;">
        <h2 class="fw-bold mb-1 text-center" style="font-size:1.65rem;color:var(--i8j-text,#1e293b);"><i class="bi bi-link-45deg me-2" style="color:var(--i8j-primary,#8b5cf6);"></i>第三方账号绑定</h2>
        <p class="text-muted text-center mb-5" style="font-size:.95rem;">绑定第三方账号后，可使用快捷登录</p>

        <div class="card border-0" style="border-radius:16px;box-shadow:var(--shadow-card);overflow:hidden;">
            <div style="padding:1.5rem 2rem;background:var(--i8j-bg-secondary,#f8fafc);border-bottom:1px solid #e2e8f0;">
                <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i>可用平台</h5>
            </div>
            <div class="p-4">
                <div class="list-group list-group-flush">
                    <!-- 寰俊 -->
                    <div class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom" style="border-color:var(--i8j-border,#f1f5f9) !important;">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:44px;height:44px;background:#07c160;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;">
                                <i class="bi bi-wechat fs-5"></i>
                            </div>
                            <div>
                                <strong style="color:var(--i8j-text,#1e293b);font-size:1rem;">寰俊</strong>
                                <small class="d-block text-muted" style="font-size:.82rem;">浣跨敤寰俊鎵爜蹇嵎登录</small>
                            </div>
                        </div>
                        <button type="button" onclick="bindOauth('wechat')" class="btn btn-sm rounded-pill px-3"
                                style="background:{if condition="$oauth.wechat"}#dcfce7;color:#16a34a;{else/}var(--color-accent);color:#fff;{/if}border:none;font-weight:600;font-size:.84rem;">
                            {if condition="$oauth.wechat"}已绑定歿else/}绑定
                        </button>
                    </div>

                    <!-- QQ -->
                    <div class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom" style="border-color:var(--i8j-border,#f1f5f9) !important;">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:44px;height:44px;background:#12b7f5;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;">
                                <i class="bi bi-qq-fill fs-5"></i>
                            </div>
                            <div>
                                <strong style="color:var(--i8j-text,#1e293b);font-size:1rem;">QQ</strong>
                                <small class="d-block text-muted" style="font-size:.82rem;">浣跨敤QQ账号蹇嵎登录</small>
                            </div>
                        </div>
                        <button type="button" onclick="bindOauth('qq')" class="btn btn-sm rounded-pill px-3"
                                style="background:{if condition="$oauth.qq"}#dcfce7;color:#16a34a;{else/}var(--color-accent);color:#fff;{/if}border:none;font-weight:600;font-size:.84rem;">
                            {if condition="$oauth.qq"}已绑定歿else/}绑定
                        </button>
                    </div>

                    <!-- Gitee -->
                    <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:44px;height:44px;background:#171515;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;">
                                <i class="bi bi-git fs-5"></i>
                            </div>
                            <div>
                                <strong style="color:var(--i8j-text,#1e293b);font-size:1rem;">Gitee</strong>
                                <small class="d-block text-muted" style="font-size:.82rem;">Gitee 开源社区账号</small>
                            </div>
                        </div>
                        <button type="button" onclick="bindOauth('gitee')" class="btn btn-sm rounded-pill px-3"
                                style="background:{if condition="$oauth.gitee"}#dcfce7;color:#16a34a;{else/}var(--color-accent);color:#fff;{/if}border:none;font-weight:600;font-size:.84rem;">
                            {if condition="$oauth.gitee"}已绑定歿else/}绑定
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4 text-muted small">
            <i class="bi bi-shield-exclamation me-1"></i> 绑定后可在该平台直接登录，无需输入密码
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
function bindOauth(platform) {
    if (confirm('确定要绑定? + platform + '账号吗？')) {
        location.href = '/member/oauth/bind?platform=' + platform;
    }
}
</script>
{/block}
