{extend name="layout" /}

{block name="title"}浼氬憳娉ㄥ唽{/block}

{block name="content"}

<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:3rem 1rem;background:var(--i8j-bg-secondary,#f8fafc);">
    <div style="width:100%;max-width:460px;background:var(--i8j-bg,#fff);border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);">
        <!-- 娣辫壊澶撮儴 -->
        <div style="background:linear-gradient(135deg, var(--i8j-text,#1e293b) 0%, var(--i8j-text,#334155) 100%);padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden;">
            <div style="position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(34,197,94,.12);border-radius:50%;"></div>
            <div style="position:relative;z-index:1;">
                <div style="width:64px;height:64px;margin:0 auto .75rem;background:rgba(255,255,255,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-person-plus" style="font-size:1.65rem;color:#fff;"></i>
                </div>
                <h4 class="text-white mb-0 fw-bold" style="font-size:1.25rem;">鍒涘缓璐﹀彿</h4>
                <p class="mb-0 opacity-75" style="color:rgba(255,255,255,.7);font-size:.88rem;">鍔犲叆鎴戜滑锛屽紑鍚櫤鑳戒箣鏃?/p>
            </div>
        </div>
        <!-- 琛ㄥ崟鍖?-->
        <div style="padding:2.25rem 2.5rem 2.5rem;">
            <form id="registerForm">
                <div class="row g-3 mb-3">
                    <div class="col-sm-6"><label class="form-label fw-semibold small text-uppercase" style="color:var(--i8j-text-secondary,#64748b);">鐢ㄦ埛鍚?/label>
                        <input type="text" name="username" class="form-control" required placeholder="鐢ㄦ埛鍚? style="border-radius:10px;border-color:var(--i8j-border,#e2e8f0);"></div>
                    <div class="col-sm-6"><label class="form-label fw-semibold small text-uppercase" style="color:var(--i8j-text-secondary,#64748b);">鏄电О</label>
                        <input type="text" name="nickname" class="form-control" placeholder="鏄电О" style="border-radius:10px;border-color:var(--i8j-border,#e2e8f0);"></div>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold small text-uppercase" style="color:var(--i8j-text-secondary,#64748b);">閭</label>
                    <input type="email" name="email" class="form-control" required placeholder="email@example.com" style="border-radius:10px;border-color:var(--i8j-border,#e2e8f0);"></div>
                <div class="mb-4"><label class="form-label fw-semibold small text-uppercase" style="color:var(--i8j-text-secondary,#64748b);">瀵嗙爜</label>
                    <input type="password" name="password" class="form-control" required placeholder="鑷冲皯6浣嶅瘑鐮? style="border-radius:10px;border-color:var(--i8j-border,#e2e8f0);"></div>
                <button type="submit" class="btn btn-lg w-100" style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border-radius:10px;font-weight:700;border:none;box-shadow:0 4px 18px rgba(34,197,94,.28);">
                    绔嬪嵆娉ㄥ唽
                </button>
            </form>
            <div class="text-center mt-4 pt-3" style="border-top:1px solid #f1f5f9;">
                <span class="text-muted small">宸叉湁璐﹀彿锛?/span> <a href="/member/login" class="small fw-bold" style="color:var(--i8j-primary,#3b82f6);text-decoration:none;">绔嬪嵆鐧诲綍</a>
            </div>
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
$('#registerForm').on('submit', function(e) {
    e.preventDefault();
    $.post('/member/register', $(this).serialize(), function(res) {
        if (res.success) { alert('娉ㄥ唽鎴愬姛锛岃鐧诲綍'); location.href = '/member/login'; }
        else alert(res.msg);
    });
});
</script>
{/block}
