{extend name="layout" /}

{block name="title"}会员登录{/block}

{block name="content"}

<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:3rem 1rem;background:#f8fafc;">
    <div style="width:100%;max-width:460px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);">
        <!-- 深色渐变头部 -->
        <div style="background:linear-gradient(135deg, #1e293b 0%, #334155 100%);padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden;">
            <div style="position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(59,130,246,.15);border-radius:50%;"></div>
            <div style="position:absolute;bottom:-20px;left:-10px;width:60px;height:60px;background:rgba(99,102,241,.10);border-radius:50%;"></div>
            <div style="position:relative;z-index:1;">
                <div style="width:64px;height:64px;margin:0 auto .75rem;background:rgba(255,255,255,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-person-check" style="font-size:1.65rem;color:#fff;"></i>
                </div>
                <h4 class="text-white mb-0 fw-bold" style="font-size:1.25rem;">欢迎回来</h4>
                <p class="mb-0 opacity-75" style="color:rgba(255,255,255,.7);font-size:.88rem;">请输入您的账号信息</p>
            </div>
        </div>
        <!-- 表单区 -->
        <div style="padding:2.25rem 2.5rem 2.5rem;">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-uppercase" style="color:#64748b;letter-spacing:.04em;">用户名 / 邮箱</label>
                    <input type="text" name="username" class="form-control form-control-lg" required placeholder="请输入用户名或邮箱"
                           style="border-radius:10px;border-color:#e2e8f0;font-size:.96rem;padding:.7rem 1rem;">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-uppercase" style="color:#64748b;letter-spacing:.04em;">密码</label>
                    <input type="password" name="password" class="form-control form-control-lg" required placeholder="请输入密码"
                           style="border-radius:10px;border-color:#e2e8f0;font-size:.96rem;padding:.7rem 1rem;">
                </div>
                <button type="submit" class="btn btn-lg w-100" style="background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border-radius:10px;font-weight:700;font-size:1rem;border:none;padding:.78rem;letter-spacing:.03em;
                    box-shadow:0 4px 18px rgba(59,130,246,.35);">
                    登录
                </button>
            </form>
            <div class="text-center mt-4 pt-3" style="border-top:1px solid #f1f5f9;">
                <span class="text-muted small">还没有账号？</span> <a href="/member/register" class="small fw-bold" style="color:#3b82f6;text-decoration:none;">立即注册</a>
            </div>
        </div>
    </div>
</div>

{/block}

{block name="js"}
<script>
$('#loginForm').on('submit', function(e) {
    e.preventDefault();
    $.post('/member/login', $(this).serialize(), function(res) {
        if (res.success) location.href = '/member/profile';
        else alert(res.msg);
    });
});
</script>
{/block}
