{extend name="layout" /}
{block name="title"}我的收藏{/block}
{block name="content"}
<div class="m-content">
    <h4 style="font-size:17px;font-weight:700;margin-bottom:12px;"><i class="bi bi-heart me-2"></i>我的收藏</h4>
    {volist name="list" id="vo"}
    <div class="m-card">
        <div class="m-card-body">
            <h6 class="m-card-tit"><a href="/info/{$vo.content_id}">{$vo.content_title ?? '内容'}</a></h6>
            <small class="text-muted" style="font-size:11.5px;">{$vo.create_time|date='Y-m-d H:i'}</small>
        </div>
    </div>
    {/volist}
    {$list|raw}
</div>
{/block}
