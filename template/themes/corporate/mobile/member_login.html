{extend name="layout" /}

{block name="title"}会员登录{/block}

{block name="content"}
<div class="cm-main">
    <div class="cm-card" style="padding:26px 20px;margin-top:8px;">
        <h4 class="text-center mb-4" style="font-size:18px;font-weight:800;color:#1e293b;">会员登录</h4>
        <form id="loginForm">
            <div class="cm-fg"><label style="font-size:12.5px;font-weight:600;color:#64748b;display:block;margin-bottom:4px;">用户名 / 邮箱</label><input type="text" name="username" class="cm-input" placeholder="请输入" required></div>
            <div class="cm-fg"><label style="font-size:12.5px;font-weight:600;color:#64748b;display:block;margin-bottom:4px;">密码</label><input type="password" name="password" class="cm-input" placeholder="请输入" required></div>
            <button type="submit" class="cm-btn cm-btn-pri" style="margin-top:8px;"><i class="bi bi-box-arrow-in-right me-2"></i>登 录</button>
        </form>
        <div class="text-center mt-3"><a href="/member/register" style="font-size:13.5px;color:#3b82f6;text-decoration:none;">还没有账号？立即注册</a></div>
    </div>
</div>
{/block}
{block name="js"}<script>$('#loginForm').on('submit',function(e){e.preventDefault();$.post('/member/login',$(this).serialize(),function(r){if(r.success){if('serviceWorker'in navigator&&navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'CLEAR_PAGES'});}location.href='/member/profile';}else showToast(r.msg||'登录失败','danger');});});</script>{/block}
