{extend name="layout" /}

{block name="title"}дјҡе‘ҳеЁүг„Ҙе”Ҫ{/block}

{block name="content"}
<div class="cm-main">
    <div class="cm-card" style="padding:26px 20px;margin-top:8px;">
        <h4 class="text-center mb-4" style="font-size:18px;font-weight:800;color:var(--i8j-text,#1e293b);">дјҡе‘ҳеЁүг„Ҙе”Ҫ</h4>
        <form id="registerForm">
            <div class="cm-fg"><input type="text" name="username" class="cm-input" placeholder="йҗўг„ҰеҹӣйҚҡе¶Ҹзҙҷи№Үе‘ӯпҪһй”ӣ? required></div>
            <div class="cm-fg"><input type="email" name="email" class="cm-input" placeholder="й–ӯоҶҫоҶҲй”ӣе қз№ҖжҝүоӮ¬зҙҡ" required></div>
            <div class="cm-fg"><input type="password" name="password" class="cm-input" placeholder="зҖөе—ҷзҲңй”ӣе қз№ҖжҝүоӮ¬зҙҡ" required></div>
            <div class="cm-fg"><input type="text" name="nickname" class="cm-input" placeholder="йҸ„з”өРһй”ӣе ҘвӮ¬еӨҠпҪһй”ӣ?></div>
            <button type="submit" class="cm-btn cm-btn-pri" style="margin-top:4px;"><i class="bi bi-person-plus me-2"></i>еЁү?йҚҗ?/button>
        </form>
        <div class="text-center mt-3"><a href="/member/login" style="font-size:13.5px;color:var(--i8j-primary,#3b82f6);text-decoration:none;">е®ёеҸүж№Ғз’җп№ҖеҪҝй”ӣзҶәзҸӣйҚ—еҙҮж«ҘиӨ°?/a></div>
    </div>
</div>
{/block}
{block name="js"}<script>$('#registerForm').on('submit',function(e){e.preventDefault();$.post('/member/register',$(this).serialize(),function(r){if(r.success){showToast('еЁүг„Ҙе”ҪйҺҙж„¬е§ӣ','success');setTimeout(function(){location.href='/member/login';},1200);}else showToast(r.msg||'еЁүг„Ҙе”Ҫжҫ¶иҫ«и§Ұ','danger');});});</script>{/block}
