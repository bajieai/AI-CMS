{extend name="layout" /}
{block name="title"}我的订阅{/block}
{block name="content"}
<div class="m-content">
    <h4 style="font-size:17px;font-weight:700;margin-bottom:12px;"><i class="bi bi-bell me-2"></i>我的订阅</h4>
    {volist name="list" id="vo"}
    <div class="m-card">
        <div class="m-card-body">
            <h6 class="m-card-tit">{$vo.subscribe_type} #{$vo.subscribe_id}</h6>
            <div class="d-flex justify-content-between align-items-center">
                <small class="text-muted">{$vo.digest_frequency} · {$vo.create_time|date='Y-m-d'}</small>
                <button class="btn btn-sm btn-outline-danger" onclick="unsubscribe({$vo.id})">取消</button>
            </div>
        </div>
    </div>
    {/volist}
    {$list|raw}
</div>
<script>
function unsubscribe(id){$.post('/subscribe/toggle',{subscribe_type:'',subscribe_id:0,id:id},function(r){if(r.code==0)location.reload()})}
</script>
{/block}
