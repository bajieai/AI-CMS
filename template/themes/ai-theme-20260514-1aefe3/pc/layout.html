<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$site_title|default='文艺清新博客'}</title>
    <meta name="keywords" content="{$site_keywords|default='文艺,清新,博客'}">
    <meta name="description" content="{$site_description|default='一个文艺清新的个人博客'}">
    <link rel="stylesheet" href="{$skin}css/style.css">
    <link rel="icon" href="{$skin}images/favicon.ico">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <a href="/" class="site-logo">
                    <span class="logo-icon">🌿</span>
                    <span class="logo-text">{$site_name|default='文艺清新'}</span>
                </a>
                <nav class="main-nav">
                    <ul>
                        <li><a href="/" class="nav-link">首页</a></li>
                        <li><a href="/list" class="nav-link">文章</a></li>
                        <li><a href="/about" class="nav-link">关于</a></li>
                    </ul>
                </nav>
                <button class="menu-toggle" id="menuToggle" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>
    <main class="site-main">
        {block name="main"}{/block}
    </main>
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <p>{$powered_by} {$copyright_info}</p>
                </div>
                <div class="footer-links">
                    <a href="/">首页</a>
                    <a href="/list">文章</a>
                    <a href="/about">关于</a>
                </div>
            </div>
        </div>
    </footer>
    <script src="{$skin}js/main.js"></script>
        <script>
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    // Only target primary nav links (inside lists), exclude brand/home logo
    document.querySelectorAll('header nav a[href], .navbar-nav a.nav-link').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && path === href) {
            el.classList.add('active');
        }
    });
});
</script>
</body>
</html>
