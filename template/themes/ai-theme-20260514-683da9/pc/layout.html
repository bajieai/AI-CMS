<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$title|default='学术绿洲 - 在线教育平台'}</title>
    <meta name="keywords" content="{$keywords|default='在线课程,教育培训,学术研究'}">
    <meta name="description" content="{$description|default='学术绿洲 - 专业在线教育培训平台'}">
    <link rel="stylesheet" href="{$skin}css/style.css">
    <link rel="icon" href="{$skin}images/favicon.ico" type="image/x-icon">
    </head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <a href="/">
                        <img src="{$skin}images/logo.png" alt="学术绿洲" class="logo-img">
                        <span class="logo-text">学术绿洲</span>
                    </a>
                </div>
                <nav class="nav" id="mainNav">
                    <ul class="nav-list">
                        <li class="nav-item"><a href="/" class="nav-link {if condition="$current == 'index'"}active{/if}">首页</a></li>
                        <li class="nav-item"><a href="/course" class="nav-link {if condition="$current == 'course'"}active{/if}">课程中心</a></li>
                        <li class="nav-item"><a href="/teacher" class="nav-link {if condition="$current == 'teacher'"}active{/if}">师资力量</a></li>
                        <li class="nav-item"><a href="/about" class="nav-link {if condition="$current == 'about'"}active{/if}">关于我们</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="/login" class="btn btn-outline">登录</a>
                    <a href="/register" class="btn btn-primary">注册</a>
                    <button class="menu-toggle" id="menuToggle" aria-label="菜单">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="main-content">
        {block name="content"}{/block}
    </main>

    <!-- 底部信息 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3 class="footer-title">关于我们</h3>
                    <p class="footer-desc">学术绿洲致力于提供高质量在线教育培训，汇聚国内外优秀师资，打造专业学术课程体系。</p>
                </div>
                <div class="footer-col">
                    <h3 class="footer-title">快速链接</h3>
                    <ul class="footer-links">
                        <li><a href="/course">课程中心</a></li>
                        <li><a href="/teacher">师资力量</a></li>
                        <li><a href="/about">关于我们</a></li>
                        <li><a href="/contact">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3 class="footer-title">联系我们</h3>
                    <ul class="footer-contact">
                        <li><span class="icon">📧</span> contact@academy-oasis.com</li>
                        <li><span class="icon">📞</span> 400-888-8888</li>
                        <li><span class="icon">📍</span> 北京市海淀区学术路88号</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>{$powered_by|raw} {$copyright_info} | <a href="/privacy">隐私政策</a> | <a href="/terms">服务条款</a></p>
            </div>
        </div>
    </footer>

    <script src="{$skin}js/main.js"></script>
        <script>
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    // Only target primary nav links (inside lists), exclude brand/home logo
    document.querySelectorAll('header nav a[href], .navbar-nav a.nav-link').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && path === href) {
            el.classList.add('active');
        }
    });
});
</script>
</body>
</html>
