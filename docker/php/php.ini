; ============================================================
; AI-CMS 全局编码配置 - 强制UTF-8
; 此文件通过 Dockerfile 复制到容器中
; ============================================================

[mbstring]
; 核心：强制 PHP 内部编码为 UTF-8（默认值在不同平台不同：
; Windows=GBK, Linux=UTF-8, macOS=UTF-8）
mbstring.internal_encoding = UTF-8
mbstring.http_input = UTF-8
mbstring.http_output = UTF-8
mbstring.encoding_translation = On
mbstring.func_overload = 0
mbstring.strict_detection = On
mbstring.substitute_character = none

; 输出编码检测顺序
mbstring.detect_order = UTF-8, ASCII, JIS, EUC-JP, SJIS, ISO-8859-1

[php]
; 默认字符集
default_charset = "UTF-8"
; 输出处理
output_handler = mb_output_handler
; 时区
date.timezone = Asia/Shanghai

; ============================================================
; V2.9.18 PHP性能优化 — 减少Docker overlayfs文件I/O延迟
; ============================================================

; Session 使用 /dev/shm (内存 tmpfs)，避免 overlayfs 慢速文件 I/O
session.save_path = "/dev/shm/php_sessions"

; 增大 realpath 缓存，减少 stat() 系统调用（Docker 环境下尤其重要）
realpath_cache_size = 2M
realpath_cache_ttl = 600

; OPcache 优化
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
