# Redis配置文件

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 密码(可选，生产环境建议启用)
# requirepass your_redis_password

# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# RDB快照配置
save 900 1
save 300 10
save 60 10000

# 日志
loglevel notice
logfile ""

# 安全（开发环境关闭保护模式，Docker内部网络需要跨容器访问）
protected-mode no

# 客户端输出缓冲区
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 超时设置
timeout 300
tcp-keepalive 300
