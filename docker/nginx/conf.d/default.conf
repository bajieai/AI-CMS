upstream php_backend {
    server php:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.html index.php;

    # 日志配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 上传文件大小限制
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_body_timeout 300s;

    # GZIP压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==================== API 请求 -> PHP-FPM ====================
    # 将 /api/xxx 重写为 index.php?s=/api/xxx（保留api前缀供ThinkPHP路由匹配）
    location /api/ {
        try_files $uri $uri/ /index.php?s=$uri&$args;
    }

    # ==================== PHP-FPM 处理 ====================
    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # 关键：将 Authorization header 传递给 PHP（JWT认证必需）
        # 默认情况下 Nginx 会丢弃 Authorization header
        set $auth "";
        if ($http_authorization) {
            set $auth $http_authorization;
        }
        fastcgi_param HTTP_AUTHORIZATION $auth;

        include fastcgi_params;

        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ==================== 前端静态资源（优先） ====================
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ==================== SPA 路由回退 -> 前端 index.html ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 禁止访问敏感文件
    location ~* \.(env|log|sql|bak|config|ini)$ {
        deny all;
    }
}
