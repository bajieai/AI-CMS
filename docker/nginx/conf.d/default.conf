upstream php_backend {
    server php:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.html index.php;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 前台入口
    location / {
        try_files $uri $uri/ /index.php?s=$uri&$args;
    }

    # 后台入口
    location /admin {
        try_files $uri $uri/ /admin.php?s=$uri&$args;
    }

    # 安装向导入口
    location /install {
        try_files $uri $uri/ /install.php?s=$uri&$args;
    }

    # API路由
    location /api/ {
        try_files $uri $uri/ /index.php?s=$uri&$args;
    }

    # PHP-FPM 处理 - 关键配置支持PATH_INFO
    location ~ ^(.+\.php)(.*)$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;

        # 分割路径信息
        fastcgi_split_path_info ^(.+\.php)(/.*)?$;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;

        include fastcgi_params;

        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # 静态资源
    location /uploads/ { expires 7d; add_header Cache-Control "public"; access_log off; try_files $uri =404; }
    location /static/ { expires 30d; add_header Cache-Control "public, immutable"; access_log off; try_files $uri =404; }
    # V2.6 主题Skin资源缓存
    location /skin/ { expires 30d; add_header Cache-Control "public, immutable"; access_log off; try_files $uri =404; }

    # 安全限制
    location ~ /\. { deny all; }
    location ~* \.(env|log|sql|bak|config|ini)$ { deny all; }
    location ~ ^/(app|config|route|runtime|vendor|database)/ { deny all; return 404; }
    location ~* /uploads/.*\.php$ { deny all; return 404; }

    # 健康检查
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
