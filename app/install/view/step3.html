<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装 AI-CMS V2.9.41 - 管理员设置</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d21 0%, #2d3748 50%, #1a365d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .install-card { width: 100%; max-width: 700px; border-radius: 1rem; overflow: hidden; box-shadow: 0 1rem 3rem rgba(0,0,0,0.3); }
        .install-header { background: rgba(13,110,253,0.9); padding: 1.5rem; color: #fff; text-align: center; }
        .install-header h3 { margin: 0; }
        .install-body { padding: 2rem; background: #fff; }
        .step-indicator { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .step-indicator .step { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; margin: 0 0.5rem; background: #e9ecef; color: #6c757d; }
        .step-indicator .step.active { background: #0d6efd; color: #fff; }
        .step-indicator .step.done { background: #198754; color: #fff; }
        .step-indicator .step-line { width: 40px; height: 2px; background: #dee2e6; align-self: center; }
    </style>
</head>
<body>
    <div class="install-card">
        <div class="install-header">
            <i class="bi bi-robot fs-2"></i>
            <h3 class="mt-2">AI-CMS V2.9.41 安装向导</h3>
        </div>
        <div class="install-body" id="mainBody">
            <div class="step-indicator">
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-line"></div>
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-line"></div>
                <div class="step active">3</div>
                <div class="step-line"></div>
                <div class="step">4</div>
                <div class="step-line"></div>
                <div class="step">5</div>
            </div>

            <h5 class="mb-3"><i class="bi bi-person-plus me-1"></i>步骤3：设置管理员</h5>

            <!-- 提示信息 -->
            <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>

            <form id="adminForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">管理员用户名 <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" value="admin" required minlength="2" maxlength="20">
                    <small class="text-muted">用于后台登录</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">管理员密码 <span class="text-danger">*</span></label>
                    <input type="password" name="password" id="pwdInput" class="form-control" required minlength="6" placeholder="请设置管理员密码（至少6位）">
                </div>
                <div class="mb-3">
                    <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                    <input type="password" name="password_confirm" id="pwdConfirm" class="form-control" required placeholder="再次输入密码">
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/install.php/index/step2" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>上一步</a>
                    <button type="submit" class="btn btn-primary" id="btnInstall">
                        <i class="bi bi-arrow-right me-1"></i>开始安装
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script>
    $(document).ready(function() {
        $('#adminForm').on('submit', function(e) {
            e.preventDefault();

            var $btn = $('#btnInstall');
            var $error = $('#errorMsg');

            // 隐藏之前的提示
            $error.addClass('d-none').text('');

            // 前端验证
            var pwd = $('input[name=password]').val();
            var pwdCfm = $('input[name=password_confirm]').val();

            if (!pwd || pwd.length < 6) {
                $error.removeClass('d-none').text('密码长度不能少于6位');
                return;
            }

            if (pwd !== pwdCfm) {
                $error.removeClass('d-none').text('两次输入的密码不一致');
                return;
            }

            // 禁用按钮，显示加载状态
            $btn.prop('disabled', true)
               .html('<span class="spinner-border spinner-border-sm me-1"></span>验证中...');

            // Step3: 提交管理员信息到 session
            $.ajax({
                url: '/install.php/index/step3',
                type: 'POST',
                data: $(this).serialize(),
                dataType: 'json',
                timeout: 10000,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                success: function(res) {
                    if (res.code === 0) {
                        // 管理员信息保存成功，执行实际安装
                        doInstall();
                    } else {
                        $btn.prop('disabled', false)
                           .html('<i class="bi bi-arrow-right me-1"></i>开始安装');
                        $error.removeClass('d-none').text(res.msg || '保存管理员信息失败');
                    }
                },
                error: function(xhr, status, error) {
                    $btn.prop('disabled', false)
                       .html('<i class="bi bi-arrow-right me-1"></i>开始安装');
                    $error.removeClass('d-none').text('网络请求失败：' + (status === 'timeout' ? '请求超时' : error));
                }
            });
        });
    });

    // 执行安装 - 分阶段模式，显示实时进度
    function doInstall() {
        var $body = $('#mainBody');
        var phases = [
            { phase: 1, label: '创建数据库', icon: 'bi-database' },
            { phase: 2, label: '创建数据库表和初始数据', icon: 'bi-table', hasProgress: true },
            { phase: 3, label: '配置管理员和系统信息', icon: 'bi-person-check' },
            { phase: 4, label: '写入配置文件', icon: 'bi-file-earmark-check' }
        ];

        // 渲染进度面板
        var progressHtml = '<div class="install-progress py-4">';
        progressHtml += '<h5 class="mb-4"><i class="bi bi-gear-wide-connected me-2"></i>正在安装，请稍候...</h5>';
        progressHtml += '<div class="progress-stages mb-4">';
        for (var i = 0; i < phases.length; i++) {
            progressHtml += '<div class="progress-stage" id="stage_' + phases[i].phase + '">';
            progressHtml += '<i class="bi ' + phases[i].icon + ' me-1"></i>';
            progressHtml += '<span>' + phases[i].label + '</span>';
            progressHtml += '<span class="stage-status ms-2" id="status_' + phases[i].phase + '">';
            progressHtml += '<span class="spinner-border spinner-border-sm text-muted"></span>';
            progressHtml += '</span>';
            progressHtml += '</div>';
        }
        progressHtml += '</div>';
        progressHtml += '<div class="progress mb-3" id="progressBar" style="height:8px">';
        progressHtml += '<div class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>';
        progressHtml += '</div>';
        progressHtml += '<p class="text-muted small" id="progressText">准备开始...</p>';
        progressHtml += '</div>';

        $body.html(progressHtml);

        var currentPhase = 0;
        var sqlOffset = 0;
        var overallPercent = 0;

        function runNextPhase() {
            if (currentPhase >= phases.length) {
                // 所有阶段完成
                $('#progressBar .progress-bar').css('width', '100%').removeClass('progress-bar-animated progress-bar-striped').addClass('bg-success');
                $('#progressText').text('安装完成！正在跳转...');
                setTimeout(function() {
                    location.href = '/install.php/index/step5';
                }, 800);
                return;
            }

            var phaseInfo = phases[currentPhase];
            var isPhase2Batch = (phaseInfo.phase === 2 && sqlOffset > 0);

            // 标记当前阶段为进行中
            $('#status_' + phaseInfo.phase).html('<span class="spinner-border spinner-border-sm text-primary"></span>');
            $('#progressText').text(phaseInfo.label + '...');

            var ajaxData = { phase: phaseInfo.phase };
            if (isPhase2Batch) {
                ajaxData.offset = sqlOffset;
            }

            $.ajax({
                url: '/install.php/index/step4',
                type: 'POST',
                data: ajaxData,
                dataType: 'json',
                timeout: 300000,
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                success: function(res) {
                    if (res.code !== 0) {
                        showError(res.msg || '安装失败');
                        return;
                    }

                    // 标记当前阶段为完成
                    $('#status_' + phaseInfo.phase).html('<i class="bi bi-check-circle-fill text-success"></i>');

                    // 更新进度条
                    if (res.percent !== undefined) {
                        // phase 2 有SQL进度百分比
                        // 整体进度：phase1=25%, phase2(0-100%)=25%-75%, phase3=85%, phase4=100%
                        if (phaseInfo.phase === 2) {
                            overallPercent = 25 + Math.round(res.percent * 0.5);
                        }
                        $('#progressBar .progress-bar').css('width', overallPercent + '%');
                        $('#progressText').text(phaseInfo.label + ' ' + res.percent + '% (' + res.executed + '/' + res.total + '条)');
                    } else {
                        // 其他阶段直接跳到对应进度
                        var phaseProgress = { 1: 25, 3: 85, 4: 100 };
                        overallPercent = phaseProgress[phaseInfo.phase] || overallPercent;
                        $('#progressBar .progress-bar').css('width', overallPercent + '%');
                    }

                    // phase 2 可能需要多批次
                    if (phaseInfo.phase === 2 && res.has_more) {
                        sqlOffset = res.next_offset;
                        // 不推进到下一个phase，继续请求本批次
                        runNextPhase();
                        return;
                    }

                    // 推进到下一个phase
                    currentPhase++;
                    sqlOffset = 0;
                    runNextPhase();
                },
                error: function(xhr, status, error) {
                    var msg = '安装请求失败';
                    if (status === 'timeout') msg = '安装超时，请稍后重试';
                    else if (xhr.status === 500) msg = '服务器内部错误';
                    else msg = '网络错误: ' + error;
                    showError(msg);
                }
            });
        }

        function showError(msg) {
            $('#progressBar .progress-bar').removeClass('progress-bar-animated progress-bar-striped').addClass('bg-danger');
            $('#progressText').html(
                '<div class="alert alert-danger mt-3">' +
                '<i class="bi bi-exclamation-triangle me-2"></i><strong>安装失败</strong><br>' +
                msg +
                '<br><button onclick="location.reload()" class="btn btn-outline-danger btn-sm mt-2">返回重试</button>' +
                '</div>'
            );
        }

        // 启动安装流程
        runNextPhase();
    }
    </script>
</body>
</html>
