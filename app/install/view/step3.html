<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装 AI-CMS V2.9.40 - 管理员设置</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d21 0%, #2d3748 50%, #1a365d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .install-card { width: 100%; max-width: 700px; border-radius: 1rem; overflow: hidden; box-shadow: 0 1rem 3rem rgba(0,0,0,0.3); }
        .install-header { background: rgba(13,110,253,0.9); padding: 1.5rem; color: #fff; text-align: center; }
        .install-header h3 { margin: 0; }
        .install-body { padding: 2rem; background: #fff; }
        .step-indicator { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .step-indicator .step { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; margin: 0 0.5rem; background: #e9ecef; color: #6c757d; }
        .step-indicator .step.active { background: #0d6efd; color: #fff; }
        .step-indicator .step.done { background: #198754; color: #fff; }
        .step-indicator .step-line { width: 40px; height: 2px; background: #dee2e6; align-self: center; }
    </style>
</head>
<body>
    <div class="install-card">
        <div class="install-header">
            <i class="bi bi-robot fs-2"></i>
            <h3 class="mt-2">AI-CMS V2.9.40 安装向导</h3>
        </div>
        <div class="install-body" id="mainBody">
            <div class="step-indicator">
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-line"></div>
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-line"></div>
                <div class="step active">3</div>
                <div class="step-line"></div>
                <div class="step">4</div>
                <div class="step-line"></div>
                <div class="step">5</div>
            </div>

            <h5 class="mb-3"><i class="bi bi-person-plus me-1"></i>步骤3：设置管理员</h5>

            <!-- 提示信息 -->
            <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>

            <form id="adminForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">管理员用户名 <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" value="admin" required minlength="2" maxlength="20">
                    <small class="text-muted">用于后台登录</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">管理员密码 <span class="text-danger">*</span></label>
                    <input type="password" name="password" id="pwdInput" class="form-control" required minlength="6" placeholder="请设置管理员密码（至少6位）">
                </div>
                <div class="mb-3">
                    <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                    <input type="password" name="password_confirm" id="pwdConfirm" class="form-control" required placeholder="再次输入密码">
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/install.php/index/step2" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>上一步</a>
                    <button type="submit" class="btn btn-primary" id="btnInstall">
                        <i class="bi bi-arrow-right me-1"></i>开始安装
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script>
    $(document).ready(function() {
        $('#adminForm').on('submit', function(e) {
            e.preventDefault();

            var $btn = $('#btnInstall');
            var $error = $('#errorMsg');

            // 隐藏之前的提示
            $error.addClass('d-none').text('');

            // 前端验证
            var pwd = $('input[name=password]').val();
            var pwdCfm = $('input[name=password_confirm]').val();

            if (!pwd || pwd.length < 6) {
                $error.removeClass('d-none').text('密码长度不能少于6位');
                return;
            }

            if (pwd !== pwdCfm) {
                $error.removeClass('d-none').text('两次输入的密码不一致');
                return;
            }

            // 禁用按钮，显示加载状态
            $btn.prop('disabled', true)
               .html('<span class="spinner-border spinner-border-sm me-1"></span>验证中...');

            // Step3: 提交管理员信息到 session
            $.ajax({
                url: '/install.php/index/step3',
                type: 'POST',
                data: $(this).serialize(),
                dataType: 'json',
                timeout: 10000,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                success: function(res) {
                    if (res.code === 0) {
                        // 管理员信息保存成功，执行实际安装
                        doInstall();
                    } else {
                        $btn.prop('disabled', false)
                           .html('<i class="bi bi-arrow-right me-1"></i>开始安装');
                        $error.removeClass('d-none').text(res.msg || '保存管理员信息失败');
                    }
                },
                error: function(xhr, status, error) {
                    $btn.prop('disabled', false)
                       .html('<i class="bi bi-arrow-right me-1"></i>开始安装');
                    $error.removeClass('d-none').text('网络请求失败：' + (status === 'timeout' ? '请求超时' : error));
                }
            });
        });
    });

    // 执行安装（创建数据库表等）
    function doInstall() {
        var $body = $('#mainBody');
        $body.html(
            '<div class="text-center py-5">' +
                '<div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem"></div>' +
                '<h5>正在安装，请稍候...</h5>' +
                '<p class="text-muted">正在创建数据库表和初始数据</p>' +
            '</div>'
        );

        $.ajax({
            url: '/install.php/index/step4',
            type: 'POST',
            dataType: 'json',
            timeout: 120000,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            },
            success: function(res) {
                if (res.code === 0) {
                    location.href = '/install.php/index/step5';
                } else {
                    $body.html(
                        '<div class="alert alert-danger text-center py-4">' +
                            '<h5><i class="bi bi-exclamation-triangle me-2"></i>安装失败</h5>' +
                            '<p class="mb-3">' + (res.msg || '未知错误') + '</p>' +
                            '<button onclick="location.reload()" class="btn btn-outline-danger">返回重试</button>' +
                        '</div>'
                    );
                }
            },
            error: function(xhr, status, error) {
                var msg = '安装请求失败';
                if (status === 'timeout') msg = '安装超时，数据库可能连接失败';
                else if (xhr.status === 500) msg = '服务器错误（500）';
                $body.html(
                    '<div class="alert alert-danger text-center py-4">' +
                        '<h5><i class="bi bi-exclamation-triangle me-2"></i>安装失败</h5>' +
                        '<p class="mb-3">' + msg + '</p>' +
                        '<button onclick="location.reload()" class="btn btn-outline-danger">返回重试</button>' +
                    '</div>'
                );
            }
        });
    }
    </script>
</body>
</html>
