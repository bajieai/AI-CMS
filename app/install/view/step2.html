<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装 AI-CMS V2.0 - 数据库配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d21 0%, #2d3748 50%, #1a365d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .install-card { width: 100%; max-width: 700px; border-radius: 1rem; overflow: hidden; box-shadow: 0 1rem 3rem rgba(0,0,0,0.3); }
        .install-header { background: rgba(13,110,253,0.9); padding: 1.5rem; color: #fff; text-align: center; }
        .install-header h3 { margin: 0; }
        .install-body { padding: 2rem; background: #fff; }
        .step-indicator { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .step-indicator .step { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; margin: 0 0.5rem; background: #e9ecef; color: #6c757d; }
        .step-indicator .step.active { background: #0d6efd; color: #fff; }
        .step-indicator .step.done { background: #198754; color: #fff; }
        .step-indicator .step-line { width: 40px; height: 2px; background: #dee2e6; align-self: center; }
    </style>
</head>
<body>
    <div class="install-card">
        <div class="install-header">
            <i class="bi bi-robot fs-2"></i>
            <h3 class="mt-2">AI-CMS V2.0 安装向导</h3>
        </div>
        <div class="install-body">
            <div class="step-indicator">
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-line"></div>
                <div class="step active">2</div>
                <div class="step-line"></div>
                <div class="step">3</div>
                <div class="step-line"></div>
                <div class="step">4</div>
                <div class="step-line"></div>
                <div class="step">5</div>
            </div>

            <h5 class="mb-3"><i class="bi bi-database me-1"></i>步骤2：数据库配置</h5>

            <!-- 提示信息 -->
            <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>
            <div id="successMsg" class="alert alert-success d-none mb-3"></div>

            <form id="dbForm" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">数据库主机</label>
                        <input type="text" name="hostname" class="form-control" value="mysql" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">端口</label>
                        <input type="text" name="hostport" class="form-control" value="3306" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">数据库名</label>
                    <input type="text" name="database" class="form-control" value="aicms_v2" placeholder="请输入数据库名">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" value="root" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="数据库密码">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">表前缀</label>
                    <input type="text" name="prefix" class="form-control" value="i8j_" required>
                    <small class="text-muted">建议使用默认前缀 i8j_</small>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/install.php" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>上一步</a>
                    <button type="submit" class="btn btn-primary" id="btnTest">
                        <i class="bi bi-arrow-right me-1"></i>测试连接并下一步
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    $(document).ready(function() {
        $('#dbForm').on('submit', function(e) {
            e.preventDefault();

            // 隐藏之前的提示
            $('#errorMsg').addClass('d-none').text('');
            $('#successMsg').addClass('d-none').text('');

            var $btn = $('#btnTest');
            $btn.prop('disabled', true)
               .html('<span class="spinner-border spinner-border-sm me-1"></span>正在测试连接...');

            // 获取表单数据
            var formData = $(this).serialize();

            $.ajax({
                url: '/install.php/index/step2',
                type: 'POST',
                data: formData,
                dataType: 'json',
                timeout: 10000,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                success: function(res) {
                    $btn.prop('disabled', false).html('<i class="bi bi-arrow-right me-1"></i>测试连接并下一步');
                    if (res.code === 0) {
                        $('#successMsg').removeClass('d-none').text(res.msg + '，正在跳转...');
                        setTimeout(function() {
                            location.href = '/install.php/index/step3';
                        }, 500);
                    } else {
                        $('#errorMsg').removeClass('d-none').text(res.msg || '未知错误');
                    }
                },
                error: function(xhr, status, error) {
                    $btn.prop('disabled', false).html('<i class="bi bi-arrow-right me-1"></i>测试连接并下一步');

                    var msg = '网络错误';
                    try {
                        var data = JSON.parse(xhr.responseText);
                        msg = data.msg || msg;
                    } catch(e) {
                        if (xhr.status === 500) {
                            msg = '服务器内部错误（500）';
                        } else if (xhr.status === 404) {
                            msg = '接口地址不存在（404）';
                        } else if (status === 'timeout') {
                            msg = '请求超时，请检查数据库连接';
                        }
                    }
                    $('#errorMsg').removeClass('d-none').text(msg);
                }
            });
        });
    });

    // 如果jQuery加载失败，提供原生JS备选方案
    window.addEventListener('load', function() {
        if (typeof $ === 'undefined' || typeof $.fn.jquery === 'undefined') {
            document.getElementById('dbForm').addEventListener('submit', function(e) {
                e.preventDefault();
                document.getElementById('errorMsg').classList.remove('d-none');
                document.getElementById('errorMsg').textContent = '页面脚本加载失败，请刷新页面重试';
            });
        }
    });
    </script>
</body>
</html>
