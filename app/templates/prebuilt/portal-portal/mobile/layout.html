<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{$site_name|default='红色资讯'}</title>
    <meta name="keywords" content="{$site_keywords|default='新闻,资讯,红色'}">
    <meta name="description" content="{$site_description|default='红色资讯新闻门户'}">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <!-- 移动端顶部 -->
    <header class="mobile-header">
        <div class="mobile-header-inner">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="mobile-logo">
                <a href="/"><img src="/assets/placeholder/logo-mobile.png" alt="{$site_name|default='红色资讯'}"></a>
            </div>
            <button class="search-toggle" id="searchToggle">🔍</button>
        </div>
        <div class="mobile-search" id="mobileSearch">
            <form action="/search" method="get">
                <input type="text" name="keyword" placeholder="搜索新闻..." class="search-input">
                <button type="submit" class="search-btn">搜索</button>
            </form>
        </div>
        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><a href="/">首页</a></li>
                {volist name="nav_list" id="nav"}
                <li><a href="{$nav.url}">{$nav.title}</a></li>
                {/volist}
            </ul>
        </nav>
    </header>

    <!-- 主体内容 -->
    <main class="mobile-main">
        {block name="content"}默认内容{/block}
    </main>

    <!-- 移动端底部 -->
    <footer class="mobile-footer">
        <div class="footer-links">
            <a href="/about">关于我们</a>
            <a href="/contact">联系方式</a>
        </div>
        <div class="footer-info">
            <p>&copy; 2024 {$site_name|default='红色资讯'} All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
</body>
</html>
