{extend name="mobile/layout" /}

{block name="content"}
<section class="hero hero--mobile">
    <div class="container hero__inner">
        <h1 class="hero__title">用文字记录生活</h1>
        <p class="hero__desc">在喧嚣的世界里，寻找一片宁静的角落。</p>
        <a href="/list" class="btn btn--primary">开始阅读</a>
    </div>
</section>

<section class="post-list-mobile">
    <div class="container">
        {volist name="posts" id="post" empty="暂无文章"}
        <article class="post-card-mobile">
            <a href="/detail/{$post.id}" class="post-card-mobile__link">
                <div class="post-card-mobile__image">
                    <img src="{$post.thumb|default='/assets/placeholder/post_mobile.jpg'}" alt="{$post.title}" class="post-card-mobile__img">
                </div>
                <div class="post-card-mobile__body">
                    <h3 class="post-card-mobile__title">{$post.title}</h3>
                    <p class="post-card-mobile__excerpt">{$post.description|mb_substr=0,80}</p>
                    <div class="post-card-mobile__meta">
                        <span class="post-card-mobile__date">{$post.create_time|date='Y-m-d'}</span>
                    </div>
                </div>
            </a>
        </article>
        {/volist}
    </div>
</section>
{/block}
